<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PayTaksi Admin - Giriş Səhifələri</title>
  <style>
    body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
    .wrap{max-width:820px;margin:0 auto;padding:22px}
    .card{background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 10px 0}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    select,button{padding:10px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb}
    button{cursor:pointer;border:none;background:#22c55e;color:#081014;font-weight:700}
    button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
    .msg{margin-top:10px;min-height:22px}
    .hint{opacity:.8;font-size:12px;margin-top:8px}
    a{color:#93c5fd;text-decoration:none}
  </style>
  <link rel="stylesheet" href="/assets/bolt.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h1>Giriş Səhifələri</h1>
        <div class="row">
          <button class="secondary" onclick="location.href='/admin/index.html'">← Admin</button>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <label style="opacity:.9">Auth mode:</label>
        <select id="mode">
          <option value="split">Ayrı (Müştəri/Sürücü ayrı giriş)</option>
          <option value="combined">Köhnə (bir səhifə içində)</option>
        </select>
        <button onclick="save()">Yadda saxla</button>
      </div>

      <div class="hint">
        <div>Split rejimdə: <a href="/" target="_blank">/</a> səhifəsi seçim ekranıdır, sonra ayrıca login/register açılır.</div>
        <div>Combined rejimdə: <a href="/legacy_auth.html" target="_blank">legacy_auth.html</a> işləyir.</div>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

<script>
async function apiGet(url){
  const res = await fetch(url);
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw data;
  return data;
}
async function apiPost(url, body){
  const res = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body||{}) });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw data;
  return data;
}
function setMsg(t){ document.getElementById('msg').textContent = t || ''; }

async function load(){
  setMsg('...');
  try{
    const d = await apiGet('/api/admin/settings');
    const v = (d && d.settings && d.settings.auth_pages_mode) ? String(d.settings.auth_pages_mode) : 'split';
    document.getElementById('mode').value = (v === 'combined') ? 'combined' : 'split';
    setMsg('');
  }catch(e){
    setMsg((e && e.error) ? e.error : 'LOAD_ERROR');
  }
}

async function save(){
  setMsg('...');
  try{
    const v = document.getElementById('mode').value;
    await apiPost('/api/admin/settings', { auth_pages_mode: v });
    setMsg('Yadda saxlandı');
  }catch(e){
    setMsg((e && e.error) ? e.error : 'SAVE_ERROR');
  }
}

load();
</script>
</body>
</html>
