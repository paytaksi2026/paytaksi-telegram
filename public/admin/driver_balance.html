<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PayTaksi Admin - Sürücü Balans</title>
  <style>
    body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:22px}
    .card{background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 10px 0}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input,select,button{padding:10px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb}
    button{cursor:pointer;border:none;background:#22c55e;color:#081014;font-weight:700}
    button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
    button.danger{background:#ef4444;color:#fff}
    .msg{margin-top:10px;min-height:22px}
    table{width:100%;border-collapse:collapse;margin-top:12px}
    th,td{padding:10px;border-bottom:1px solid rgba(148,163,184,.15);text-align:left;font-size:14px}
    th{opacity:.85}
    .badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid rgba(148,163,184,.25)}
    .neg{background:rgba(239,68,68,.12)}
    .pos{background:rgba(34,197,94,.12)}
    .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace}
  </style>
  <link rel="stylesheet" href="/assets/bolt.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <h1>Sürücü Balans</h1>
        <div class="row">
          <button class="secondary" onclick="location.href='/admin/index.html'">← Admin</button>
          <button class="danger" onclick="logout()">Çıxış</button>
        </div>
      </div>

      <div class="card" style="margin-top:14px;background:rgba(2,6,23,.35)">
        <div class="row">
          <span class="badge">Qayda: balans ≤ <span id="minBalLbl" class="mono">-15.00</span> olduqda sifariş qəbul edilmir</span>
        </div>
        <div class="row" style="margin-top:10px">
          <label style="opacity:.85">Min balans (blok):</label>
          <input id="minBal" type="number" step="0.01" value="-15" />
          <button class="secondary" onclick="saveMinBalance()">Yadda saxla</button>
          <button class="secondary" onclick="loadAll()">Yenilə</button>
        </div>
        <div class="msg" id="msg"></div>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Ad</th>
            <th>Telefon</th>
            <th>Balans</th>
            <th>Top-up / Düzəliş</th>
            <th>Tarixçə</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div id="ledgerBox" class="card" style="margin-top:14px;background:rgba(2,6,23,.35);display:none"></div>
    </div>
  </div>

<script>
async function api(url, body){
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : '{}'
  });
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw data;
  return data;
}
function setText(id, t){ document.getElementById(id).textContent = t || ''; }
function fmtMoney(n){
  n = Number(n);
  if(!Number.isFinite(n)) n = 0;
  return (Math.round(n*100)/100).toFixed(2);
}
function esc(s){ return String(s||'').replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }

async function logout(){
  try{ await api('/api/admin/logout', {}); }catch(e){}
  location.href = '/admin/index.html';
}

async function loadSettings(){
  const res = await fetch('/api/admin/settings');
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw data;
  const v = Number(data.settings?.driver_min_balance ?? -15);
  minBal.value = String(Number.isFinite(v)?v:-15);
  minBalLbl.textContent = fmtMoney(Number(minBal.value));
}

async function saveMinBalance(){
  setText('msg','...');
  try{
    const v = Number(minBal.value);
    await api('/api/admin/settings', { driver_min_balance: v });
    minBalLbl.textContent = fmtMoney(v);
    setText('msg','Yadda saxlandı.');
  }catch(e){
    setText('msg', (e && e.error) ? e.error : 'ERROR');
  }
}

async function loadDrivers(){
  setText('msg','...');
  const res = await fetch('/api/admin/driver-balances');
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw data;
  const list = data.drivers || [];
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  for(const d of list){
    const tr = document.createElement('tr');
    const bal = Number(d.driver_balance||0);
    const badgeClass = bal < 0 ? 'badge neg' : 'badge pos';
    tr.innerHTML = `
      <td>${d.id}</td>
      <td>${esc(d.name||'')}</td>
      <td class="mono">${esc(d.phone||'')}</td>
      <td><span class="${badgeClass} mono">${fmtMoney(bal)}</span></td>
      <td>
        <div class="row" style="gap:6px">
          <input class="mono" style="width:120px" type="number" step="0.01" placeholder="məs: 10" id="amt_${d.id}" />
          <input style="width:180px" placeholder="səbəb (opsional)" id="rsn_${d.id}" />
          <button class="secondary" onclick="adjust(${d.id})">Tətbiq et</button>
        </div>
      </td>
      <td>
        <button class="secondary" onclick="showLedger('${esc(d.phone||'')}')">Göstər</button>
      </td>
    `;
    tb.appendChild(tr);
  }
  setText('msg', 'Drivers: ' + list.length);
}

async function adjust(id){
  const amtEl = document.getElementById('amt_' + id);
  const rsnEl = document.getElementById('rsn_' + id);
  const amount = Number(amtEl.value);
  const reason = String(rsnEl.value||'').trim();
  if(!Number.isFinite(amount) || amount === 0){ setText('msg','Məbləğ yaz (müsbət top-up, mənfi cərimə).'); return; }
  setText('msg','...');
  try{
    await api('/api/admin/driver-balance/adjust', { id, amount, reason });
    amtEl.value = '';
    rsnEl.value = '';
    await loadDrivers();
    setText('msg','OK');
  }catch(e){
    setText('msg', (e && e.error) ? e.error : 'ERROR');
  }
}

async function showLedger(phone){
  setText('msg','...');
  try{
    const res = await fetch('/api/admin/driver-balance/ledger?phone=' + encodeURIComponent(phone));
    const data = await res.json().catch(()=> ({}));
    if(!res.ok) throw data;
    const rows = data.ledger || [];
    const html = `
      <div class="row" style="justify-content:space-between">
        <div>
          <div style="font-weight:700">Tarixçə</div>
          <div class="mono" style="opacity:.85">${esc(phone)}</div>
        </div>
        <button class="secondary" onclick="hideLedger()">Bağla</button>
      </div>
      <table style="margin-top:10px">
        <thead>
          <tr>
            <th>ID</th>
            <th>Məbləğ</th>
            <th>Səbəb</th>
            <th>Order</th>
            <th>Admin</th>
            <th>Tarix</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>{
            const amt = Number(r.amount||0);
            const b = amt < 0 ? 'badge neg' : 'badge pos';
            const dt = r.created_at ? new Date(Number(r.created_at)).toLocaleString() : '';
            return `<tr>
              <td>${r.id}</td>
              <td><span class="${b} mono">${fmtMoney(amt)}</span></td>
              <td>${esc(r.reason||'')}</td>
              <td class="mono">${r.order_id||''}</td>
              <td>${esc(r.admin_user||'')}</td>
              <td>${esc(dt)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
    ledgerBox.style.display = 'block';
    ledgerBox.innerHTML = html;
    setText('msg','');
  }catch(e){
    setText('msg', (e && e.error) ? e.error : 'ERROR');
  }
}
function hideLedger(){
  ledgerBox.style.display = 'none';
  ledgerBox.innerHTML = '';
}

async function loadAll(){
  try{
    await loadSettings();
    await loadDrivers();
  }catch(e){
    setText('msg', (e && e.error) ? e.error : 'ADMIN_REQUIRED');
  }
}

loadAll();
</script>
</body>
</html>
