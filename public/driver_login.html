<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayTaksi - Sürücü Giriş</title>

<style>
  body{background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
  .card{width:min(560px,92vw);background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h2{margin:0 0 12px 0;text-align:center;font-weight:800}
  input,select,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb;box-sizing:border-box}
  input::placeholder{color:rgba(226,232,240,.55)}
  .row{display:flex;gap:10px}
  .row > *{flex:1}
  button{cursor:pointer;border:none;background:#22c55e;color:#081014;font-weight:800}
  button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
  .msg{margin-top:12px;text-align:center;min-height:22px}
  .hint{opacity:.8;font-size:12px;text-align:center;margin-top:10px}
  .links{display:flex;gap:10px;margin-top:10px}
  .links a{flex:1;text-decoration:none}
</style>
<link rel="stylesheet" href="/assets/bolt.css" />

</head>
<body>
  <div class="card">
    <h2>Sürücü Giriş</h2>

    <div class="row">
      <input id="phonePrefix" value="+994" readonly />
      <input id="phoneDigits" placeholder="77XXXXXXX" autocomplete="tel" inputmode="numeric" maxlength="9" pattern="[0-9]{9}" />
    </div>
    <input id="password" type="password" placeholder="Şifrə" autocomplete="current-password" />

    <div class="row" style="margin-top:8px">
      <button id="btnLogin" type="button" onclick="doLogin()">Daxil ol</button>
      <button class="secondary" type="button" onclick="goBack()">Geri</button>
    </div>

    <div class="row" style="margin-top:10px">
      <button class="secondary" type="button" onclick="goRegister()">Qeydiyyat</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint">Sürücü üçün giriş: yalnız nömrə və şifrə.</div>
    <div class='hint'>Sürücü hesabı üçün admin təsdiqi lazımdır.</div>
  </div>

<script>
const ROLE = "driver";
const msg = document.getElementById('msg');
const phoneDigits = document.getElementById('phoneDigits');
const password = document.getElementById('password');

function showMsg(t, ok=false) {
  msg.style.color = ok ? '#86efac' : '#fca5a5';
  msg.textContent = t || '';
}

function normPhone() {
  const digits = String(phoneDigits.value||'').replace(/\D/g,'').slice(0,9);
  return '+994' + digits;
}

function goBack() {
  window.location.href = "/";
}

function goRegister() {
  window.location.href = ROLE === 'driver' ? "/driver_register.html" : "/passenger_register.html";
}

async function doLogin() {
  try {
    showMsg('...');
    const phone = normPhone();
    const pass = String(password.value||'');
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone, password: pass, role: ROLE })
    });
    const j = await r.json();
    if (j && j.pending) {
      showMsg('Hesab təsdiq gözləyir.', false);
      return;
    }
    if (!j || !j.success) {
      const e = (j && (j.error||j.message)) || 'LOGIN_FAILED';
      showMsg(e);
      return;
    }
    // store session used by app pages
    localStorage.setItem('pt_session', JSON.stringify({
      phone, password: pass, role: ROLE, name: j.name||'',
      driver_radius_km: j.driver_radius_km||0,
      is_online: j.is_online||0,
      allowed_packages: j.allowed_packages||[],
      enabled_packages: j.enabled_packages||[],
      driver_balance: j.driver_balance||0
    }));
    // redirect
    if (ROLE === 'driver') window.location.href = '/app/driver.html';
    else window.location.href = '/app/passenger_map.html';
  } catch(e) {
    showMsg('NETWORK_ERROR');
  }
}
</script>
</body>
</html>
