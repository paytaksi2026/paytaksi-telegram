<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sifariş Tarixçəsi</title>
  <style>
    :root{
      --bg:#07131c;
      --card:rgba(15,23,42,.75);
      --stroke:rgba(148,163,184,.18);
      --txt:#e5e7eb;
      --muted:rgba(226,232,240,.7);
      --btn:rgba(148,163,184,.14);
      --btn2:rgba(148,163,184,.10);
      --green:#22c55e;
      --red:#ef4444;
    }
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(1200px 700px at 20% 0%, rgba(34,197,94,.08), transparent 55%), radial-gradient(1000px 600px at 80% 20%, rgba(59,130,246,.10), transparent 55%), var(--bg); color:var(--txt); font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    .wrap{max-width:720px;margin:0 auto;padding:18px;}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;}
    .title{font-size:22px;font-weight:800;letter-spacing:.2px}
    .btn{border:1px solid var(--stroke);background:var(--btn);color:var(--txt);padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer}
    .btn.secondary{background:var(--btn2)}
    .card{border:1px solid var(--stroke);background:var(--card);border-radius:18px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
    .meta{color:var(--muted);font-size:13px;margin-top:4px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .pill{display:inline-block;border:1px solid var(--stroke);background:rgba(2,6,23,.35);padding:6px 10px;border-radius:999px;font-weight:700;font-size:12px}
    .pill.cancel{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.18);color:#fecaca;}
    .pill.done{border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.16);color:#bbf7d0;}
    .list{margin-top:10px}
    .item{padding:10px 0;border-bottom:1px solid rgba(148,163,184,.12)}
    .item:last-child{border-bottom:none}
    .lbl{opacity:.92}
    .small{opacity:.65;font-size:13px}
    .paging{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;}
    .paging .btn{padding:10px 12px;}
    .paging .btn[disabled]{opacity:.45;cursor:not-allowed}
    a{color:#93c5fd;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn secondary" onclick="goBack()">← Geri</button>
      <div class="title">Sifariş Tarixçəsi</div>
      <button class="btn secondary" onclick="reload()">Yenilə</button>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div style="font-weight:800">Son sifarişlər</div>
          <div class="meta">Səhifə: <span id="pageNo">1</span> • Hər səhifədə 5 sifariş</div>
        </div>
        <span class="pill" id="countPill">0</span>
      </div>

      <div class="list" id="list"></div>

      <div class="paging">
        <button class="btn secondary" id="prevBtn" onclick="prevPage()">◀ Önceki</button>
        <button class="btn" id="nextBtn" onclick="nextPage()">Sonrakı ▶</button>
      </div>
    </div>
  </div>

<script>
  const PAGE_SIZE = 5;
  const s = (()=>{ try { return JSON.parse(localStorage.getItem('pt_session')||'{}')||{}; } catch(e){ return {}; } })();

  function qs(name){
    const u = new URL(window.location.href);
    return u.searchParams.get(name);
  }
  function setQs(name, val){
    const u = new URL(window.location.href);
    u.searchParams.set(name, String(val));
    window.history.replaceState({},'',u.toString());
  }
  function fmtTs(v){
    if(v===null || v===undefined || v==='') return '';
    const n = Number(v);
    if(!Number.isFinite(n)) return '';
    const ms = n < 1e12 ? n*1000 : n;
    const d = new Date(ms);
    if(Number.isNaN(d.getTime())) return '';
    return d.toLocaleString();
  }
  function goBack(){
    // back to passenger panel
    window.location.href = '/app/passenger_map.html';
  }

  let page = Math.max(1, Number(qs('page')||'1'));
  let all = [];

  function stText(st){
    st = String(st||'').toLowerCase();
    if(st==='cancelled') return 'Ləğv olundu';
    if(st==='completed') return 'Uğurlu';
    return st || '—';
  }
  function stClass(st){
    st = String(st||'').toLowerCase();
    if(st==='cancelled') return 'cancel';
    if(st==='completed') return 'done';
    return '';
  }

  function render(){
    document.getElementById('pageNo').textContent = String(page);
    const list = document.getElementById('list');
    const start = (page-1) * PAGE_SIZE;
    const slice = all.slice(start, start + PAGE_SIZE);

    document.getElementById('countPill').textContent = String(all.length);

    if(!slice.length){
      list.innerHTML = '<div class="small" style="padding:10px 0">Sifariş tapılmadı.</div>';
    } else {
      list.innerHTML = slice.map(o => {
        const st = String(o.status||'').toLowerCase();
        const pkg = o.fare_package ? `<span class="pill" style="margin-left:6px">${o.fare_package}</span>` : '';
        const est = (o.est_fare != null) ? `<div class="lbl" style="margin-top:4px"><b>Təxmini:</b> ${Number(o.est_km||0).toFixed(1)} km • ${o.est_fare} AZN</div>` : '';

        const driverLine = o.driver_phone ? (() => {
          const tel = `<a href="tel:${o.driver_phone}">${o.driver_phone}</a>`;
          const nm = o.driver_name ? ` • ${o.driver_name}` : '';
          return `<div class="lbl" style="margin-top:4px"><b>Sürücü:</b> ${tel}${nm}</div>`;
        })() : '';

        return `
          <div class="item">
            <div><b>#${o.id}</b> <span class="pill ${stClass(st)}">${stText(st)}</span>${pkg}</div>
            <div class="lbl" style="margin-top:4px"><b>Haradan:</b> ${o.pickup_text||''}</div>
            <div class="lbl" style="margin-top:4px"><b>Haraya:</b> ${o.dropoff_text||''}</div>
            ${est}
            ${driverLine}
            <div class="small" style="margin-top:4px">${fmtTs(o.created_at)}</div>
          </div>
        `;
      }).join('');
    }

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    prevBtn.disabled = page <= 1;
    nextBtn.disabled = (start + PAGE_SIZE) >= all.length;
  }

  function prevPage(){
    if(page<=1) return;
    page -= 1;
    setQs('page', page);
    render();
  }
  function nextPage(){
    const start = (page-1) * PAGE_SIZE;
    if((start + PAGE_SIZE) >= all.length) return;
    page += 1;
    setQs('page', page);
    render();
  }
  function reload(){
    load();
  }

  async function load(){
    const list = document.getElementById('list');
    list.innerHTML = '<div class="small" style="padding:10px 0">Yüklənir…</div>';

    if(!s || !s.phone || !s.password){
      list.innerHTML = '<div class="small" style="padding:10px 0">Sessiya tapılmadı. Zəhmət olmasa yenidən giriş edin.</div>';
      setTimeout(()=>{ window.location.href = '/passenger_login.html'; }, 900);
      return;
    }

    const res = await fetch('/api/orders/my?phone=' + encodeURIComponent(s.phone) + '&password=' + encodeURIComponent(s.password));
    const data = await res.json().catch(()=> ({}));
    if(!data.success){
      list.innerHTML = '<div class="small" style="padding:10px 0">Sifarişlər yüklənmədi.</div>';
      return;
    }

    // Defensive: dedupe by order id
    const raw = Array.isArray(data.orders) ? data.orders : [];
    const byId = new Map();
    for (const o of raw){
      const id = Number(o && o.id);
      if (!id) continue;
      if (!byId.has(id)) byId.set(id, o);
    }
    all = Array.from(byId.values()).sort((a,b)=> Number(b.id||0) - Number(a.id||0));

    // clamp page
    const maxPage = Math.max(1, Math.ceil(all.length / PAGE_SIZE));
    if(page > maxPage) page = maxPage;
    setQs('page', page);

    render();
  }

  load();
</script>
</body>
</html>
