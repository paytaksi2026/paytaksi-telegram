
<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Avtomobillər - PayTaksi</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Arial;background:#0b1220;color:#fff;margin:0}
.wrap{max-width:800px;margin:auto;padding:20px}
.card{background:#111827;padding:16px;border-radius:14px;margin-bottom:16px}
input{width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#020617;color:#fff;margin-top:6px}
button{padding:10px 14px;border:none;border-radius:8px;background:#22c55e;color:#000;font-weight:700;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
<h2>Yeni Avtomobil Əlavə Et</h2>

<div class="card">
<label>Marka</label>
<input id="make">
<label>Model</label>
<input id="model">
<label>İl</label>
<input id="year">
<label>Rəng</label>
<input id="color">
<label>Nömrə</label>
<input id="plate">
</div>

<div class="card">
<h3>Avtomobil şəkilləri</h3>
<label>Qabaq</label><input type="file">
<label>Arxa</label><input type="file">
<label>Yan</label><input type="file">
<label>Qabaq salon</label><input type="file">
<label>Arxa salon</label><input type="file">
<label>Yük yeri</label><input type="file">
</div>

<button>Yadda saxla</button>

</div>
</body>
</html>
