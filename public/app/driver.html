	<script>
function getSession(){ try{ return JSON.parse(localStorage.getItem('pt_session')||'null'); }catch(e){ return null; } }
function logout(){ localStorage.removeItem('pt_session'); location.href='/'; }


function fmtTs(v){
  if(v===null || v===undefined || v==='') return '';
  const n = Number(v);
  if(!Number.isFinite(n)) return '';
  const ms = n < 1e12 ? n*1000 : n; // seconds -> ms
  const d = new Date(ms);
  if(Number.isNaN(d.getTime())) return '';
  return d.toLocaleString();
}
function setMsg(t){ document.getElementById('msg').textContent = t||''; }
function setSt(on){
  const el=document.getElementById('st');
  if(!el) return;
  el.classList.remove('st-online','st-offline');
  if(on){
    el.classList.add('st-online');
    el.innerHTML = '<span class="pt-live-dot"></span> ONLINE';
  }else{
    el.classList.add('st-offline');
    el.textContent = 'OFFLINE';
  }
}
function fmtMoney(v){
  const n = Number(v||0);
  if(!Number.isFinite(n)) return '0.00';
  return n.toFixed(2);
}
function renderBalance(balance, minBalance){
  const b = Number(balance||0);
  const min = (minBalance===null || minBalance===undefined) ? -15 : Number(minBalance);
  const el = document.getElementById('bal');
  const hint = document.getElementById('balHint');
  if(el){
    el.textContent = fmtMoney(b) + ' AZN';

  // Balansın üzərinə basanda tarixçə açılsın
  // (details/summary çox yer tutmasın deyə tarixçə default qapalı qalır)
  if(el && !el.dataset.bindLedger){
    el.dataset.bindLedger = '1';
    el.addEventListener('click', ()=>{
      const wrap = document.getElementById('ledgerWrap');
      if(!wrap) return;
      wrap.open = !wrap.open;
      if(wrap.open){
        // Açılan kimi yüklə
        try{  }catch(e){}
        // Açılan hissəyə scroll et (mobil üçün)
        try{ wrap.scrollIntoView({behavior:'smooth', block:'start'}); }catch(e){}
      }
    });
  }
    // Visual warning when below/at limit
    if(Number.isFinite(min) && b <= min){
      el.style.borderColor = 'rgba(239,68,68,.65)';
      el.style.background = 'rgba(239,68,68,.12)';
      if(hint) hint.textContent = ' (limit: ' + fmtMoney(min) + ' AZN — qəbul bağlanır)';
    }else{
      el.style.borderColor = 'rgba(148,163,184,.25)';
      el.style.background = 'rgba(148,163,184,.10)';
      if(hint) hint.textContent = (Number.isFinite(min) ? (' (limit: ' + fmtMoney(min) + ' AZN)') : '');
    }
  }
}


function applyActiveOrderUI(activeOrder){
  const has = !!activeOrder;
  const controls = document.getElementById('controlsRow');
  const pkg = document.getElementById('pkgSection');
  const feed = document.getElementById('feedSection');
  const title = document.getElementById('myTitle');
  if(controls) controls.style.display = has ? 'none' : 'flex';
  if(pkg) pkg.style.display = has ? 'none' : 'block';
  if(feed) feed.style.display = has ? 'none' : 'block';
  if(title) title.textContent = has ? 'Aktiv sifariş' : 'Mənim qəbul etdiklərim';
}

function ledgerLabel(row){
  const reason = String(row?.reason||'').toLowerCase();
  if(reason === 'commission') return 'Komissiya çıxdı';
  if(reason === 'admin_adjust') return 'Admin düzəlişi';
  if(row?.admin_user) return 'Admin düzəlişi';
  return row?.reason ? String(row.reason) : 'Hərəkət';
}





const s = getSession();
if(!s || s.role !== 'driver'){ location.href='/'; }
document.getElementById('who').textContent = 'Hörmətli ' + (s.name||'') + ' (' + (s.phone||'') + ')';
setSt(!!s.is_online);
renderBalance(s.driver_balance||0, (s.min_balance!=null?s.min_balance:-15));

async function refreshDriverMeta(){
  try{
    const res = await fetch('/api/driver/status', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone:s.phone, password:s.password })});
    const data = await res.json();
    if(data && data.success){
      const r = Number(data.driver_radius_km||s.driver_radius_km||4);
      s.driver_radius_km = r;
      s.allowed_packages = Array.isArray(data.allowed_packages) ? data.allowed_packages : (s.allowed_packages||[]);
      s.enabled_packages = Array.isArray(data.enabled_packages) ? data.enabled_packages : (s.enabled_packages||s.allowed_packages||[]);
      localStorage.setItem('pt_session', JSON.stringify(s));
      const sel = document.getElementById('radiusSelect');
      if(sel) sel.value = String([2,4,8].includes(r)?r:4);
      s.driver_balance = (data.driver_balance!=null)? Number(data.driver_balance): (s.driver_balance||0);
      s.min_balance = (data.min_balance!=null)? Number(data.min_balance): (s.min_balance!=null?s.min_balance:-15);
      renderBalance(s.driver_balance, s.min_balance);
      await renderPackagePrefs();
      
    }
  }catch(e){}
}
refreshDriverMeta();

setInterval(refreshDriverMeta, 30000);

async function getFarePackages(){
  try{
    const r = await fetch('/api/fare-packages');
    const j = await r.json();
    if(j && j.success && Array.isArray(j.packages)) return j.packages;
  }catch(e){}
  return [
    {id:'economy', name:'Ekonom'},
    {id:'comfort', name:'Komfort'},
    {id:'business', name:'Biznes'}
  ];
}

async function renderPackagePrefs(){
  const box = document.getElementById('pkgBox');
  if(!box) return;
  const pkgs = await getFarePackages();
  const allowed = new Set((s.allowed_packages||[]).map(x=>String(x).toLowerCase().trim()).filter(Boolean));
  const enabled = new Set((s.enabled_packages||s.allowed_packages||[]).map(x=>String(x).toLowerCase().trim()).filter(Boolean));
  box.innerHTML = pkgs.map(p=>{
    const id = String(p.id||'').toLowerCase().trim();
    const isAllowed = allowed.size ? allowed.has(id) : (id==='economy');
    const checked = enabled.size ? enabled.has(id) : isAllowed;
    const dis = isAllowed ? '' : 'disabled';
    const hint = isAllowed ? '' : ' (admin icazə verməyib)';
    return `<label class="pill" style="cursor:${isAllowed?'pointer':'not-allowed'};user-select:none;opacity:${isAllowed?1:0.55}">
      <input type="checkbox" data-pkg="${id}" ${checked?'checked':''} ${dis} style="margin-right:8px;vertical-align:middle" onchange="savePackages()" />
      ${esc(p.name||id)}${hint}
    </label>`;
  }).join('');

  // update active order for map + modal gating
  // fixed: removed invalid list reference
  currentActiveOrder = activeMy || null;
  if(activeMy){
    updateRouteForOrder(activeMy);
  }else{
    document.getElementById('mapInfo').textContent = 'Xəritə: aktiv sifariş yoxdur';

const wazeBtn = document.getElementById('wazeFloatingBtn');
if(wazeBtn) wazeBtn.style.display = 'none';
	  
	  const nb = document.getElementById('navBtn');
    if(nb) nb.style.display = 'none';
    ensureMap();
  }
}


async function savePackages(){
  const box = document.getElementById('pkgBox');
  if(!box) return;
  const checks = Array.from(box.querySelectorAll('input[type=checkbox][data-pkg]'));
  const list = checks.filter(c=>c.checked).map(c=>c.getAttribute('data-pkg')).filter(Boolean);
  if(list.length===0){
    // keep at least one enabled package (first allowed)
    const firstAllowed = checks.find(c=>!c.disabled);
    if(firstAllowed){ firstAllowed.checked = true; list.push(firstAllowed.getAttribute('data-pkg')); }
  }
  setMsg('...');
  try{
    const res = await fetch('/api/driver/set-packages', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone:s.phone, password:s.password, enabled_packages:list })});
    const data = await res.json();
    if(data && data.success){
      s.allowed_packages = data.allowed_packages || (s.allowed_packages||[]);
      s.enabled_packages = data.enabled_packages || list;
      localStorage.setItem('pt_session', JSON.stringify(s));
      setMsg('Paketlər yadda saxlandı.');
      loadFeed();
    }else{
      setMsg((data && data.error) ? data.error : 'ERROR');
    }
  }catch(e){
    setMsg('ERROR');
  }
}

async function goOnline(){
  setMsg('...');
  const res = await fetch('/api/driver/online', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone:s.phone, password:s.password })});
  const data = await res.json();
  if(data.success){ s.is_online=1; localStorage.setItem('pt_session', JSON.stringify(s)); setSt(true); setMsg('Online oldunuz.'); }
  else if(data.error==='DRIVER_NOT_APPROVED'){ setMsg('Admin təsdiqi yoxdur.'); }
  else setMsg(data.error||'ERROR');
}
async function changeRadius(){
  const r = Number(document.getElementById('radiusSelect').value);
  setMsg('...');
  const res = await fetch('/api/driver/set-radius', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone:s.phone, password:s.password, radius_km:r })});
  const data = await res.json();
  if(data.success){ setMsg('Radius: ' + data.driver_radius_km + ' km'); }
  else setMsg(data.error||'ERROR');
}

async function goOffline(){
  setMsg('...');
  const res = await fetch('/api/driver/offline', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone:s.phone, password:s.password })});
  const data = await res.json();
  if(data.success){ s.is_online=0; localStorage.setItem('pt_session', JSON.stringify(s)); setSt(false); setMsg('Offline oldunuz.'); }
  else setMsg(data.error||'ERROR');
}



// Incoming order (modal)
const ignoredOrders = new Map(); // orderId -> expiresAt
let lastIncomingId = null;
let currentActiveOrder = null;

function pruneIgnored(){
  const now = Date.now();
  for(const [k,v] of ignoredOrders.entries()){
    if(!v || v < now) ignoredOrders.delete(k);
  }
}

function onOverlayClick(ev){
  // click outside sheet closes
  if(ev && ev.target && ev.target.id==='incomingModal') hideIncoming();
}

function hideIncoming(){
  __stopIncomingAlert();
  const m = document.getElementById('incomingModal');
  if(m) m.style.display = 'none';
}

function ignoreIncoming(id){
  // ignore for 2 minutes
  ignoredOrders.set(Number(id), Date.now() + 120000);
  hideIncoming();
}


let __alertInterval = null;
let __vibeInterval = null;
let __audioCtx = null;
let __audioUnlocked = false;

function __unlockAudioOnce(){
  if(__audioUnlocked) return;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) { __audioUnlocked = true; return; }
    __audioCtx = __audioCtx || new AC();
    if(__audioCtx.state === 'suspended'){
      __audioCtx.resume().catch(()=>{});
    }
    // create a tiny silent buffer to "prime" on iOS
    const o = __audioCtx.createOscillator();
    const g = __audioCtx.createGain();
    g.gain.value = 0.00001;
    o.connect(g); g.connect(__audioCtx.destination);
    o.start();
    o.stop(__audioCtx.currentTime + 0.02);
    __audioUnlocked = true;
  }catch(e){
    __audioUnlocked = true;
  }
}

// Try to unlock audio on first user gesture (required by many mobile browsers)
window.addEventListener('pointerdown', __unlockAudioOnce, {once:true, passive:true});
window.addEventListener('touchstart', __unlockAudioOnce, {once:true, passive:true});

function __beepOnce(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    __audioCtx = __audioCtx || new AC();
    if(__audioCtx.state === 'suspended'){ __audioCtx.resume().catch(()=>{}); }
    const o = __audioCtx.createOscillator();
    const g = __audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 880; // "Bolt-like" sharp beep
    g.gain.value = 0.18;
    o.connect(g); g.connect(__audioCtx.destination);
    const t = __audioCtx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o.start(t);
    o.stop(t + 0.20);
  }catch(e){}
}

function __startIncomingAlert(){
  __stopIncomingAlert();
  // Sound: beep every 700ms (for up to 20s unless user acts)
  let startedAt = Date.now();
  __beepOnce();
  __alertInterval = setInterval(()=>{
    if(Date.now() - startedAt > 20000){ __stopIncomingAlert(); return; }
    __beepOnce();
  }, 700);

  // Vibration: repeat pattern (if supported)
  try{
    if(navigator.vibrate){
      navigator.vibrate([200,120,200,120,200]);
      __vibeInterval = setInterval(()=>{
        try{ navigator.vibrate([200,120,200,120,200]); }catch(e){}
      }, 2200);
    }
  }catch(e){}
}

function __stopIncomingAlert(){
  if(__alertInterval){ clearInterval(__alertInterval); __alertInterval=null; }
  if(__vibeInterval){ clearInterval(__vibeInterval); __vibeInterval=null; }
  try{ if(navigator.vibrate) navigator.vibrate(0); }catch(e){}
}

// Incoming (Yeni sifariş) önbaxış xəritəsi
let incomingMap, incomingPickupMarker, incomingDropoffMarker, incomingRoute;

function ensureIncomingMap(lat=40.4093, lng=49.8671){
  const el = document.getElementById('incomingMap');
  if(!el) return;

  // Modal hər dəfə açılıb-bağlananda container yenidən yarana bilər
  const sameContainer = incomingMap && incomingMap._container === el;
  if(sameContainer) return;

  try{ if(incomingMap) incomingMap.remove(); }catch(e){}
  incomingMap = L.map(el, {
    zoomControl:false,
    attributionControl:false,
    dragging:true,
    scrollWheelZoom:false,
    doubleClickZoom:false,
    boxZoom:false,
    keyboard:false,
    tap:true
  }).setView([lat,lng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(incomingMap);
}

async function updateIncomingPreviewMap(o){
  if(!o) return;
  const pLat = Number(o.pickup_lat), pLng = Number(o.pickup_lon);
  const dLat = Number(o.dropoff_lat), dLng = Number(o.dropoff_lon);
  if(!isFinite(pLat)||!isFinite(pLng)||!isFinite(dLat)||!isFinite(dLng)) return;

  ensureIncomingMap(pLat,pLng);
  if(!incomingMap) return;

  // Leaflet modal içində ölçü problemi olmasın
  try{ setTimeout(()=>{ try{ incomingMap.invalidateSize(); }catch(e){} }, 50); }catch(e){}

  if(incomingPickupMarker) incomingPickupMarker.remove();
  if(incomingDropoffMarker) incomingDropoffMarker.remove();
  if(incomingRoute) incomingRoute.remove();

  incomingPickupMarker = L.marker([pLat,pLng]).addTo(incomingMap).bindPopup('Götürmə');
  incomingDropoffMarker = L.marker([dLat,dLng]).addTo(incomingMap).bindPopup('Təyinat');

  try{
    const poly = await osrmPolyline(pLat,pLng,dLat,dLng);
    incomingRoute = L.polyline(poly, { weight: 5, dashArray: '6 10' }).addTo(incomingMap);
  }catch(e){
    // Fallback: düz xətt
    incomingRoute = L.polyline([[pLat,pLng],[dLat,dLng]], { weight: 4, dashArray: '6 10' }).addTo(incomingMap);
  }

  try{
    const g = L.featureGroup([incomingPickupMarker, incomingDropoffMarker, incomingRoute]);
    incomingMap.fitBounds(g.getBounds().pad(0.18));
  }catch(e){}
}

function ensureMap(lat=40.4093, lng=49.8671){
  if(map) return;
  map = L.map('map').setView([lat,lng], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap contributors' }).addTo(map);
  meMarker = L.marker([lat,lng]).addTo(map).bindPopup('Siz');
}

async function osrmPolyline(aLat,aLng,bLat,bLng){
  const url = `https://router.project-osrm.org/route/v1/driving/${aLng},${aLat};${bLng},${bLat}?overview=full&geometries=geojson`;
  const r = await fetch(url);
  if(!r.ok) throw new Error('OSRM_ERROR');
  const j = await r.json();
  const coords = j.routes?.[0]?.geometry?.coordinates || [];
  return coords.map(c=>[c[1],c[0]]);
}

else{

    document.getElementById('mapInfo').textContent = `Marşrut: Siz → Götürmə → Təyinat (Sifariş #${o.id})`;

    const toPickup = ['accepted','arrived'].includes(String(o.status||'').toLowerCase());

function renderChatMsg(x){
  const mine = String(x.sender_role||'')==='driver';
  const who = mine ? 'Siz' : 'Müştəri';
  const ts = fmtTs(x.created_at);
  return `<div class="chatMsg ${mine?'chatMe':''}">
    <div>${esc(x.message)}</div>

  </div>`;

async function loadChat(reset){
  if(!chatOrderId) return;
  const body = document.getElementById('chatBody');
  const inp = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const note = document.getElementById('chatNote');
  const qs = new URLSearchParams({
    order_id: chatOrderId,
    role: 'driver',
    phone: s.phone,
    password: s.password,
    since_id: chatLastId
  });
  try{
    const res = await fetch('/api/orders/chat?' + qs.toString());
    const ct = (res.headers.get('content-type') || '').toLowerCase();
    if(!ct.includes('application/json')){
      if(note) note.textContent = 'Xəta: HTTP_' + res.status;
      chatCanWrite = false;
      if(inp) inp.disabled = true;
      if(btn) btn.disabled = true;
      if(reset && body) body.innerHTML = '';
      return;
    }
    const data = await res.json().catch(()=>({}));
    if(!data.success){
      const err = data.error || 'ERROR';
      if(note) note.textContent = (err==='CHAT_DISABLED') ? 'Chat admin tərəfindən deaktiv edilib.' : ('Xəta: ' + err);
      chatCanWrite = false;
      if(inp) inp.disabled = true;
      if(btn) btn.disabled = true;
      if(reset && body) body.innerHTML = '';
      return;
    }
    const canWrite = !!data.can_write;
    chatCanWrite = canWrite;
    if(inp) inp.disabled = !canWrite;
    if(btn) btn.disabled = !canWrite;
    if(note) note.textContent = canWrite ? '' : 'Bu mərhələdə yalnız oxumaq mümkündür.';

    const msgs = Array.isArray(data.messages) ? data.messages : [];
    if(reset) body.innerHTML = '';
    if(msgs.length){
      const atBottom = Math.abs(body.scrollHeight - body.scrollTop - body.clientHeight) < 40;
      for(const x of msgs){
        chatLastId = Math.max(chatLastId, Number(x.id)||chatLastId);
        body.insertAdjacentHTML('beforeend', renderChatMsg(x));
      }
      if(atBottom || reset) body.scrollTop = body.scrollHeight;
    }
  }catch(e){
    if(note) note.textContent = 'Şəbəkə xətası.';
  }
}

async function sendChat(){
  if(!chatOrderId || !chatCanWrite) return;
  const inp = document.getElementById('chatInput');
  const note = document.getElementById('chatNote');
  const txt = String(inp.value||'').trim();
  if(!txt) return;
  inp.value = '';
  try{
    const res = await fetch('/api/orders/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ order_id: chatOrderId, role:'driver', phone:s.phone, password:s.password, message: txt })
    });
    const ct = (res.headers.get('content-type') || '').toLowerCase();
    if(!ct.includes('application/json')){
      if(note) note.textContent = 'Xəta: HTTP_' + res.status;
      return;
    }
    const data = await res.json().catch(()=>({}));
    if(!data.success){
      if(note) note.textContent = (data.error==='READ_ONLY') ? 'Bu mərhələdə yazmaq olmaz.' : ('Xəta: ' + (data.error||'ERROR'));
      return;
    }
    await loadChat(false);
  }catch(e){
    if(note) note.textContent = 'Şəbəkə xətası.';
  }
}

function startLocationLoop(){
  if(!('geolocation' in navigator)) return;
  navigator.geolocation.watchPosition(async (pos)=>{
    const now = Date.now();
    if(now - lastLocSentAt < 10000) return;
    lastLocSentAt = now;
    lastPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    ensureMap(lastPos.lat, lastPos.lng);
    if(meMarker) meMarker.setLatLng([lastPos.lat, lastPos.lng]);
    try{
      await fetch('/api/driver/location', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ phone:s.phone, password:s.password, lat: pos.coords.latitude, lng: pos.coords.longitude })});
    }catch(e){/* ignore */}
  }, ()=>{}, {enableHighAccuracy:true, maximumAge:10000, timeout:13000});
}

      </div>`;

      ${o.est_fare!=null ? `<div style="margin-top:6px;opacity:.8"><b>Təxmini:</b> ${Number(o.est_km||0).toFixed(1)} km • ${Number(o.est_fare).toFixed(2)} AZN</div>` : ''}
      <div style="margin-top:6px;opacity:.9"><b>Haraya:</b> ${esc(o.dropoff_text)}</div>
      ${at ? `<div style="margin-top:6px;opacity:.75"><b>Qəbul:</b> ${at}</div>` : ''}
      ${(o.status==='completed' && o.final_fare!=null) ? `<div style="margin-top:6px;opacity:.85"><b>Yekun:</b> ${Number(o.final_fare).toFixed(2)} AZN • <b>Sizin:</b> ${Number(o.driver_earn||0).toFixed(2)} AZN</div>` : `<div style="margin-top:6px;opacity:.85"><b>Təxmini:</b> ${Number(o.est_fare||0).toFixed(2)} AZN</div>`}
      <div style="margin-top:6px;opacity:.65">${dt}</div>
      ${actions}
    </div>`;
  }).join('');

  // update active order for map + modal gating
  const activeMy = (data.orders||[]).find(x=>['accepted','arrived','in_progress'].includes(String(x.status||'').toLowerCase()));
  currentActiveOrder = activeMy || null;
  if(activeMy){
    updateRouteForOrder(activeMy);
  }else{
    document.getElementById('mapInfo').textContent = 'Xəritə: aktiv sifariş yoxdur';
    const nb = document.getElementById('navBtn');
    if(nb) nb.style.display = 'none';
    ensureMap();
  }
}

function wazeLinkForOrder(o, type){
  if(!o) return '';
  const pLat = Number(o.pickup_lat), pLng = Number(o.pickup_lon);
  const dLat = Number(o.dropoff_lat), dLng = Number(o.dropoff_lon);
  let lat = pLat, lng = pLng;
  if(type === 'dropoff'){
    lat = dLat; lng = dLng;
  }
  if(!isFinite(lat) || !isFinite(lng)) return '';
  return `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`;
}

function navBtnHtml(link, text){
  if(!link) return '';
  return `<a href="${link}" target="_blank" style="
    padding:10px 12px;
    border-radius:10px;
    background:#22c55e;
    color:#081014;
    font-weight:700;
    text-decoration:none;
    display:inline-block;
  ">${text}</a>`;
}

<script>
function playCashSound(){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'triangle';
    o.frequency.value = 1200;
    g.gain.value = 0.15;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    o.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.2);
    o.stop(ctx.currentTime + 0.25);
  }catch(e){}
}

function animateBalanceFlow(amount){
  const bal = document.getElementById('bal');
  if(!bal) return;
  const current = parseFloat(bal.innerText.replace(' AZN','')) || 0;
  const target = current + amount;
  let start = current;
  const step = amount / 25;
  const interval = setInterval(()=>{
    start += step;
    if(start >= target){
      start = target;
      clearInterval(interval);
    }
    bal.innerText = start.toFixed(2) + " AZN";
  }, 20);
}

function showFareModal(finalFare, commission, driverEarn){
  const main = document.getElementById('fareCustomerAmount');
  main.innerText = finalFare.toFixed(2) + " AZN";
  document.getElementById('fareCommission').innerText = commission.toFixed(2) + " AZN";
  document.getElementById('fareDriverEarn').innerText = driverEarn.toFixed(2) + " AZN";
  document.getElementById('fareResultModal').style.display = "flex";
  main.classList.add("cash-animate");
  setTimeout(()=> main.classList.remove("cash-animate"), 1600);
  playCashSound();
  animateBalanceFlow(driverEarn);
}

function closeFareModal(){
  document.getElementById('fareResultModal').style.display = "none";
}
</script>

}

const __origLoadMy = loadMy;
loadMy = async function(){
  const prev = __lastActiveOrderId;
  await __origLoadMy();

  try{
    const qs = new URLSearchParams({ phone: s.phone, password: s.password });
    const r = await fetch('/api/orders/driver/my?' + qs.toString());

    if(!d.success) return;

    const active = (d.orders||[]).find(x=>['accepted','arrived','in_progress'].includes(String(x.status||'').toLowerCase()));
    const cancelled = (d.orders||[]).find(x=>String(x.status||'').toLowerCase()==='cancelled');

    if(active){
      __lastActiveOrderId = active.id;
    }else{
      if(prev && cancelled){
        showCancelPopup();
      }
      __lastActiveOrderId = null;
    }
  }catch(e){}
};
