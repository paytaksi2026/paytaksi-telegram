<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sürücü Paneli - PayTaksi PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system;
  background:linear-gradient(160deg,#0f172a,#0b1220);
  color:#f1f5f9;
}

.wrap{max-width:1100px;margin:auto;padding:40px 20px}
.card{
  background:rgba(15,23,42,.65);
  backdrop-filter:blur(14px);
  border:1px solid rgba(148,163,184,.15);
  border-radius:24px;
  padding:30px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

button{
  padding:12px 18px;
  border-radius:14px;
  border:none;
  font-weight:700;
  cursor:pointer;
}

.primary{background:#22c55e;color:#041014}
.secondary{background:#374151;color:#fff}

.badge{
  padding:6px 14px;
  border-radius:999px;
  font-size:12px;
  background:rgba(148,163,184,.12);
  border:1px solid rgba(148,163,184,.25);
}

.online{
  background:#0f9d58 !important;
  box-shadow:0 0 18px rgba(34,197,94,.8);
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(34,197,94,.4)}
  50%{box-shadow:0 0 25px rgba(34,197,94,1)}
  100%{box-shadow:0 0 10px rgba(34,197,94,.4)}
}

#map{
  height:420px;
  border-radius:24px;
  margin-top:20px;
  border:1px solid rgba(148,163,184,.2);
  box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.order-card{
  margin-top:18px;
  padding:18px;
  border-radius:20px;
  background:rgba(2,6,23,.55);
  border:1px solid rgba(148,163,184,.15);
}

.balance-warning{
  color:#f87171;
  font-weight:700;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h2>Sürücü Paneli PRO</h2>
<div id="who"></div>

<br>
Status: <span id="st" class="badge">OFFLINE</span>
<div id="balanceBlock" class="balance-warning" style="display:none">
Balans limitdən aşağıdır. Online ola bilməzsiniz.
</div>

<br><br>

<button class="primary" onclick="goOnline()">Online</button>
<button class="secondary" onclick="goOffline()">Offline</button>

<div id="map"></div>
<div id="feed"></div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function getSession(){
  try{return JSON.parse(localStorage.getItem('pt_session'))}
  catch(e){return null}
}

const s = getSession()
if(!s || s.role!=='driver'){location.href='/'}

document.getElementById('who').textContent =
  "Hörmətli " + s.name + " (" + s.phone + ")"

function setStatus(on){
  const el=document.getElementById('st')
  if(on){el.textContent="ONLINE";el.classList.add("online")}
  else{el.textContent="OFFLINE";el.classList.remove("online")}
}

let map, meMarker, routeLine

function initMap(){
  map=L.map('map').setView([40.4093,49.8671],13)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)
  meMarker=L.marker([40.4093,49.8671]).addTo(map)
}
initMap()

navigator.geolocation.watchPosition(pos=>{
  if(meMarker){
    const lat=pos.coords.latitude
    const lng=pos.coords.longitude
    meMarker.setLatLng([lat,lng])
    map.setView([lat,lng])
  }
})

async function goOnline(){
  if(s.driver_balance && s.driver_balance < -15){
    document.getElementById('balanceBlock').style.display='block'
    return
  }

  const res = await fetch('/api/driver/online',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ phone:s.phone,password:s.password })
  })
  const data = await res.json()
  if(data.success){
    s.is_online=1
    localStorage.setItem('pt_session',JSON.stringify(s))
    setStatus(true)
  }
}

async function goOffline(){
  const res = await fetch('/api/driver/offline',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ phone:s.phone,password:s.password })
  })
  const data = await res.json()
  if(data.success){
    s.is_online=0
    localStorage.setItem('pt_session',JSON.stringify(s))
    setStatus(false)
  }
}

async function drawAnimatedRoute(start, end){
  if(routeLine) routeLine.remove()
  routeLine=L.polyline([], {color:'#22c55e',weight:6}).addTo(map)

  const steps=50
  for(let i=0;i<=steps;i++){
    const lat=start[0]+(end[0]-start[0])*(i/steps)
    const lng=start[1]+(end[1]-start[1])*(i/steps)
    routeLine.addLatLng([lat,lng])
    await new Promise(r=>setTimeout(r,15))
  }
}

async function loadFeed(){
  const qs=new URLSearchParams({ phone:s.phone,password:s.password })
  const res=await fetch('/api/orders/feed?'+qs.toString())
  const data=await res.json()

  if(!data.success || !data.orders || data.orders.length===0){
    document.getElementById('feed').innerHTML="Yeni sifariş yoxdur"
    return
  }

  document.getElementById('feed').innerHTML=
    data.orders.map(o=>`
      <div class="order-card">
        <b>#${o.id}</b>
        <div>📍 ${o.pickup_text}</div>
        <div>🏁 ${o.dropoff_text}</div>
        <button class="primary" onclick="acceptOrder(${o.id},${o.pickup_lat},${o.pickup_lon})">
          Qəbul et
        </button>
      </div>
    `).join('')
}

async function acceptOrder(id, lat, lon){
  const res=await fetch('/api/orders/accept',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ phone:s.phone,password:s.password,order_id:id })
  })
  const data=await res.json()
  if(data.success){
    const myPos=meMarker.getLatLng()
    drawAnimatedRoute([myPos.lat,myPos.lng],[lat,lon])
    loadFeed()
  }
}

loadFeed()

// Real-time hazırlıq (socket qoşula bilər)
window.initSocket = function(socket){
  socket.on('new_order', data=>{
    loadFeed()
  })
}
</script>

</body>
</html>
