<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sürücü Paneli - PayTaksi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial}
.wrap{max-width:1000px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:16px}
button{padding:10px 14px;border-radius:10px;border:none;background:#22c55e;color:#000;font-weight:700;cursor:pointer}
.secondary{background:#374151;color:#fff}
#map{height:340px;border-radius:16px;margin-top:15px}
.badge{padding:4px 10px;border-radius:999px;background:#1f2937;font-size:12px}
</style>
</head>
<body>

<div class="wrap">
<div class="card">
<h2>Sürücü Paneli</h2>
<div id="who"></div>
<br>
Status: <span id="st" class="badge">OFFLINE</span>
<br><br>
<button onclick="goOnline()">Online</button>
<button class="secondary" onclick="goOffline()">Offline</button>
<br><br>
<div id="map"></div>
<br>
<div id="feed"></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

function getSession(){
  try{ return JSON.parse(localStorage.getItem('pt_session')) }
  catch(e){ return null }
}

const s = getSession()
if(!s || s.role!=='driver'){ location.href='/' }

document.getElementById('who').textContent =
  "Hörmətli " + s.name + " (" + s.phone + ")"

function setStatus(on){
  const el=document.getElementById('st')
  if(on){
    el.textContent="ONLINE"
    el.style.background="#16a34a"
  }else{
    el.textContent="OFFLINE"
    el.style.background="#7f1d1d"
  }
}

setStatus(!!s.is_online)

let map, meMarker

function initMap(){
  map=L.map('map').setView([40.4093,49.8671],13)
  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19}
  ).addTo(map)
  meMarker=L.marker([40.4093,49.8671]).addTo(map)
}
initMap()

async function goOnline(){
  try{
    const res = await fetch('/api/driver/online',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        phone:s.phone,
        password:s.password
      })
    })
    const data = await res.json()
    if(data.success){
      s.is_online=1
      localStorage.setItem('pt_session',JSON.stringify(s))
      setStatus(true)
    }
  }catch(e){ console.log(e) }
}

async function goOffline(){
  try{
    const res = await fetch('/api/driver/offline',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        phone:s.phone,
        password:s.password
      })
    })
    const data = await res.json()
    if(data.success){
      s.is_online=0
      localStorage.setItem('pt_session',JSON.stringify(s))
      setStatus(false)
    }
  }catch(e){ console.log(e) }
}

async function loadFeed(){
  try{
    const qs=new URLSearchParams({
      phone:s.phone,
      password:s.password
    })
    const res=await fetch('/api/orders/feed?'+qs.toString())
    const data=await res.json()
    if(!data.success){
      document.getElementById('feed').innerHTML="ERROR"
      return
    }
    if(!data.orders || data.orders.length===0){
      document.getElementById('feed').innerHTML="Yeni sifariş yoxdur"
      return
    }
    document.getElementById('feed').innerHTML=
      data.orders.map(o=>`
        <div style="margin-top:15px;padding:15px;background:#1f2937;border-radius:12px">
        <b>#${o.id}</b><br>
        ${o.pickup_text}<br>
        ${o.dropoff_text}<br><br>
        <button onclick="acceptOrder(${o.id})">Qəbul et</button>
        </div>
      `).join('')
  }catch(e){ console.log(e) }
}

async function acceptOrder(id){
  try{
    const res=await fetch('/api/orders/accept',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        phone:s.phone,
        password:s.password,
        order_id:id
      })
    })
    const data=await res.json()
    if(data.success){
      alert("Qəbul edildi")
      loadFeed()
    }
  }catch(e){ console.log(e) }
}

navigator.geolocation.watchPosition(pos=>{
  if(meMarker){
    meMarker.setLatLng([
      pos.coords.latitude,
      pos.coords.longitude
    ])
    map.setView([
      pos.coords.latitude,
      pos.coords.longitude
    ])
  }
})

loadFeed()
setInterval(loadFeed,4000)

</script>
</body>
</html>
