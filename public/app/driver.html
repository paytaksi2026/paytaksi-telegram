
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Driver</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
html,body{margin:0;height:100%;font-family:Arial}
#map{height:100%;display:none}
#loginBox{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#111;color:white;z-index:10000;flex-direction:column;}
input{padding:10px;margin:5px;border-radius:6px;border:none;width:220px}
button{padding:10px 14px;margin:5px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#2ecc71;color:white}
</style>
</head>
<body>

<div id="loginBox">
<h3>Sürücü Giriş</h3>
<input id="phoneInput" placeholder="+994XXXXXXXXX">
<input id="passInput" type="password" placeholder="Şifrə">
<button class="primary" onclick="login()">Daxil ol</button>
</div>

<div id="map"></div>

<script>
let phone=null;
let password=null;
let map;

async function login(){
phone=document.getElementById("phoneInput").value;
password=document.getElementById("passInput").value;

const r=await fetch('/api/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({phone,password,role:'driver'})
});
const d=await r.json();
if(!d.success){alert("Login uğursuz");return;}

// SET DRIVER ONLINE
await fetch('/api/driver/online',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({phone,password})
});

document.getElementById("loginBox").style.display="none";
document.getElementById("map").style.display="block";

map=L.map('map').setView([40.4093,49.8671],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

alert("Driver online oldu. İndi sifariş gələcək.");
}
</script>

</body>
</html>
