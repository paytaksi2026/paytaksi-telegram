<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sürücü Paneli - PayTaksi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:14px}
  .card{background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  button{padding:10px 12px;border-radius:10px;border:none;background:#22c55e;color:#081014;font-weight:700;cursor:pointer}
  button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-block;padding:4px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(148,163,184,.10);font-size:12px}

  /* Driver status visual */
  #st.st-online{
    background:#0b7a2a;
    color:#fff;
    border-color:rgba(34,197,94,.55);
    box-shadow:0 0 12px rgba(0,255,100,.55);
    animation:ptPulseOnline 1.8s infinite;
  }
  #st.st-offline{
    background:#c91c1c;
    color:#fff;
    border-color:rgba(239,68,68,.55);
    box-shadow:none;
    animation:none;
    opacity:.9;
  }
  #st .pt-live-dot{
    width:8px;height:8px;border-radius:50%;
    background:#00ff66;
    display:inline-block;
    box-shadow:0 0 10px rgba(0,255,102,.75);
    animation:ptBlink 1s infinite;
  }
  @keyframes ptPulseOnline{
    0%{ box-shadow:0 0 6px rgba(0,255,100,.35); }
    50%{ box-shadow:0 0 16px rgba(0,255,100,.9); }
    100%{ box-shadow:0 0 6px rgba(0,255,100,.35); }
  }
  @keyframes ptBlink{
    0%{ opacity:1; }
    50%{ opacity:.3; }
    100%{ opacity:1; }
  }
  .msg{min-height:22px;margin-top:10px}
  .pill{display:inline-block;padding:6px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(148,163,184,.10);font-size:12px}
#map{height:52vh;width:100%}
  /* incoming modal */
  .overlay{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);z-index:9999}
  .sheet{width:min(760px,100%);max-height:88vh;background:rgba(2,6,23,.96);border:1px solid rgba(148,163,184,.18);border-radius:18px 18px 0 0;overflow:hidden}
  .sheetHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(148,163,184,.15)}
  .sheetBody{padding:12px 14px;max-height:78vh;overflow:auto}
  #incomingMap{height:190px;border-radius:14px;overflow:hidden;border:1px solid rgba(148,163,184,.18);background:rgba(2,6,23,.35)}
  .kpi{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kpi .badge{font-size:12px}
  .btnRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .btnDanger{background:rgba(239,68,68,.15);color:#fecaca;border:1px solid rgba(239,68,68,.35)}
  .small{font-size:12px;opacity:.8}

  /* Chat modal */
  .chatOverlay{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);z-index:10000}
  .chatSheet{width:min(760px,100%);max-height:88vh;background:rgba(2,6,23,.96);border:1px solid rgba(148,163,184,.18);border-radius:18px 18px 0 0;overflow:hidden}
  .chatHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(148,163,184,.15)}
  .chatBody{padding:12px 14px;max-height:62vh;overflow:auto}
  .chatMsg{max-width:86%;padding:10px 12px;border-radius:14px;border:1px solid rgba(148,163,184,.18);background:rgba(148,163,184,.10);margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
  .chatMe{margin-left:auto;background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.25)}
  .chatMeta{font-size:11px;opacity:.7;margin-top:4px}
  .chatFoot{padding:12px 14px;border-top:1px solid rgba(148,163,184,.15);display:flex;gap:10px;align-items:center}
  .chatFoot input{flex:1}
  .chatNote{font-size:12px;opacity:.75;margin-top:6px}
</style>

<link rel="stylesheet" href="/assets/bolt.css" />

<style>
@keyframes cashPulse {
  0% { transform: scale(1); box-shadow: 0 0 0 rgba(34,197,94,0.4); }
  50% { transform: scale(1.08); box-shadow: 0 0 30px rgba(34,197,94,0.9); }
  100% { transform: scale(1); box-shadow: 0 0 0 rgba(34,197,94,0.4); }
}
.cash-animate {
  animation: cashPulse 0.8s ease-in-out 2;
}
</style>

</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div>
        <h2 style="margin:0">Sürücü Paneli</h2>
        <div style="opacity:.85" id="who"></div>
      </div>
      <div class="row">
        <button class="secondary" onclick="logout()">Çıxış</button>
      </div>
    </div>

    <p style="margin-top:14px">Status: <span class="badge" id="st">OFFLINE</span></p>
    <p style="margin-top:6px">Balans: <span class="badge" id="bal" style="cursor:pointer" title="Balans tarixçəsini aç/bağla">0.00 AZN</span> <span id="balHint" style="opacity:.75;font-size:12px"></span></p>


 



  </div>
</div>
    <div id="controlsRow" class="row">
      <button onclick="goOnline()">Online ol</button>
      <button class="secondary" onclick="goOffline()">Offline ol</button>
      <select id="radiusSelect" class="secondary" style="padding:10px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb" onchange="changeRadius()">
        <option value="2">2 km</option>
        <option value="4">4 km</option>
        <option value="8">8 km</option>
      </select>

    </div>

    <div id="pkgSection" style="margin-top:10px">
      <div style="opacity:.85;font-size:13px;margin-bottom:6px">İcazə verilən paketlər:</div>
      <div class="row" id="pkgBox"></div>
      <div style="opacity:.65;font-size:12px;margin-top:6px">Qeyd: Seçdiyiniz paketlərə uyğun sifarişlər sizə görünəcək.</div>
    </div>
    <div class="msg" id="msg"></div>

	<div style="margin-top:12px">
	  <div class="row" style="justify-content:space-between">
	    <span class="pill" id="mapInfo">Xəritə: GPS + marşrut (OSRM)</span>
	    <a class="secondary" id="navBtn" target="_blank" rel="noreferrer" style="display:none">Naviqasiya</a>
	  </div>
	  <div id="map" style="margin-top:10px">
  <button id="centerBtn" style="
    position:absolute;
    bottom:15px;
    right:15px;
    z-index:1000;
    width:56px;
    height:56px;
    border-radius:50%;
    border:none;
    background:white;
    box-shadow:0 6px 20px rgba(0,0,0,.35);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  ">
    🎯
  </button>



<button id="wazeFloatingBtn" style="
  position:absolute;
  bottom:85px;
  right:15px;
  z-index:1000;
  width:64px;
  height:64px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,#ffffff,#f3f4f6);
  box-shadow:0 12px 30px rgba(0,0,0,.45);
  cursor:pointer;
  display:none;
  align-items:center;
  justify-content:center;
  transition:all .25s ease;
">
<svg viewBox="0 0 64 64" width="38" height="38">
  <path fill="#33CCFF" d="M32 6c-13 0-23 8-23 18 0 9 6 15 13 16 1 5 5 8 10 8s9-3 10-8c7-1 13-7 13-16C55 14 45 6 32 6z"/>
  <circle cx="24" cy="26" r="3" fill="#000"/>
  <circle cx="40" cy="26" r="3" fill="#000"/>
  <path d="M26 36c2 2 10 2 12 0" stroke="#000" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
</button>
</div>
	</div>
 <hr style="border:none;border-top:1px solid rgba(148,163,184,.18);margin:16px 0" />
 <div id="feedSection">
    <div class="row" style="justify-content:space-between;align-items:flex-end">
     </div>
    <div id="feed" style="margin-top:10px"></div>
   </div>
    <hr style="border:none;border-top:1px solid rgba(148,163,184,.18);margin:16px 0" />
     <div id="my" style="margin-top:10px"></div>
  
<div style="margin-top:20px;text-align:center">
  <a href="driver_history.html" style="
    display:inline-block;
    padding:12px 18px;
    border-radius:12px;
    background:#1f2937;
    border:1px solid rgba(148,163,184,.25);
    color:#e5e7eb;
    font-weight:700;
    text-decoration:none;
  ">📜 Gediş tarixçəsi</a>
</div>

</div>
</div>

<!-- Incoming order modal (auto) -->
<div id="incomingModal" class="overlay" onclick="onOverlayClick(event)">
  <div class="sheet">
    <div class="sheetHead">
      <div>
        <div style="font-weight:900">Yeni sifariş</div>
        <div class="small" id="incomingSub">Sifariş gəldi</div>
      </div>
      <button class="secondary" onclick="hideIncoming()">Bağla</button>
    </div>
    <div class="sheetBody">
      <div id="incomingBox"></div>
    </div>
  </div>
</div>

<!-- Chat modal -->
<div id="chatModal" class="chatOverlay" onclick="onChatOverlayClick(event)">
  <div class="chatSheet">
    <div class="chatHead">
      <div>
        <div style="font-weight:900">Chat</div>
        <div class="small" id="chatSub">—</div>
      </div>
      <button class="secondary" onclick="closeChatModal()">Bağla</button>
    </div>
    <div class="chatBody" id="chatBody"></div>
    <div class="chatFoot">
      <input id="chatInput" placeholder="Mesaj yaz..." />
      <button id="chatSendBtn" onclick="sendChat()">Göndər</button>
    </div>
    <div class="chatNote" id="chatNote" style="padding:0 14px 12px 14px"></div>
  </div>
</div>

	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
	


<script>
window.__lastCompletedOrder = window.__lastCompletedOrder || null;

async function checkCompletedFare(){
 try{
  const qs=new URLSearchParams({phone:s.phone,password:s.password});
  const r=await fetch('/api/orders/driver/my?'+qs.toString());
  const d=await r.json();
  if(!d.success) return;

  const completed=(d.orders||[]).find(x=>String(x.status||'').toLowerCase()==='completed');

  if(completed && window.__lastCompletedOrder!==completed.id){
    window.__lastCompletedOrder=completed.id;

    const finalFare=Number(completed.final_fare||0);
    const driverEarn=Number(completed.driver_earn||0);
    const commission=finalFare-driverEarn;

    if(finalFare>0 && typeof showFareModal==='function'){
        showFareModal(finalFare,commission,driverEarn);
    }
  }
 }catch(e){}
}

setInterval(checkCompletedFare,4000);
</script>

</body>
