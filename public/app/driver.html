<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sürücü Paneli - PayTaksi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="/assets/bolt.css" />
<style>
body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:18px}
.card{background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:16px}
button{padding:10px 12px;border-radius:10px;border:none;background:#22c55e;color:#081014;font-weight:700;cursor:pointer}
button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(148,163,184,.10);font-size:12px}
#map{height:340px;border-radius:14px;overflow:hidden;border:1px solid rgba(148,163,184,.22);background:rgba(2,6,23,.35)}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h2>Sürücü Paneli</h2>
    <p>Status: <span class="badge" id="st">OFFLINE</span></p>
    <p>Balans: <span class="badge" id="bal">0.00 AZN</span></p>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function getSession(){
  try{return JSON.parse(localStorage.getItem('pt_session')||'null');}
  catch(e){return null;}
}

const s = getSession();
if(!s || s.role !== 'driver'){ location.href='/'; }

document.getElementById('st').innerText = s.is_online ? "ONLINE" : "OFFLINE";
document.getElementById('bal').innerText = (Number(s.driver_balance||0)).toFixed(2) + " AZN";

let map = L.map('map').setView([40.4093, 49.8671], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

navigator.geolocation.watchPosition(function(pos){
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  map.setView([lat,lng],15);
  L.marker([lat,lng]).addTo(map);
}, function(){}, {enableHighAccuracy:true});
</script>

</body>
</html>
