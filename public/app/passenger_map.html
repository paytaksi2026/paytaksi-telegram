<style>
  body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
  #map{height:52vh;width:100%}
  .wrap{max-width:980px;margin:0 auto;padding:14px}
  .card{background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .pad{padding:14px}
  input,button{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb;box-sizing:border-box}
  button{background:#22c55e;border:none;color:#081014;font-weight:700;cursor:pointer}
  button.secondary{background:rgba(148,163,184,.15);border:1px solid rgba(148,163,184,.25);color:#e5e7eb}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .msg{min-height:22px;margin-top:10px}
  .suggest{background:rgba(2,6,23,.8);border:1px solid rgba(148,163,184,.15);border-radius:10px;margin-top:6px;overflow:hidden}
  .suggest button{width:100%;text-align:left;background:transparent;border:none;color:#e5e7eb;padding:10px 12px;cursor:pointer}
  .suggest button:hover{background:rgba(148,163,184,.12)}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(148,163,184,.10);font-size:12px}

  /* Nicer status UI */
  .ride-ui { margin-top:10px; padding:12px; border:1px solid rgba(255,255,255,.10); border-radius:14px; background: rgba(17,24,39,.55); }
  .ride-ui .top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .ride-ui .title { font-weight:700; }
  .ride-ui .sub { font-size:12px; color:#94a3b8; margin-top:2px; }
  .ride-ui .eta { font-size:12px; color:#cbd5e1; margin-top:6px; }
  .ride-ui .driverline{margin-top:8px;font-size:12px;color:#e2e8f0;line-height:1.35}
  .ride-ui .driverline a{color:#93c5fd;text-decoration:none}
  .ride-ui .driverline .muted{color:#94a3b8}
  .steps { display:flex; gap:8px; margin-top:10px; }
  .step { flex:1; padding:8px 6px; border-radius:12px; text-align:center; font-size:12px; border:1px solid rgba(255,255,255,.10); background: rgba(255,255,255,.03); color:#94a3b8; }
  .step.active { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.35); color:#e2e8f0; }
  .step.done { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.35); color:#e2e8f0; }
  .progress { margin-top:10px; height:10px; border-radius:999px; background: rgba(255,255,255,.07); overflow:hidden; }
  .progress > div { height:100%; width:0%; background: linear-gradient(90deg, #22c55e, #3b82f6); }
  .status-actions { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:10px; }
  .sound-toggle { display:flex; align-items:center; gap:8px; font-size:12px; color:#cbd5e1; user-select:none; }
  .sound-toggle input { transform: translateY(1px); }
  .est{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
  .pkgbar{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap}
  .pkgbtn{flex:1;min-width:120px;padding:10px 12px;border-radius:12px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.45);color:#e5e7eb;cursor:pointer;font-weight:700}
  .pkgbtn small{display:block;font-weight:400;opacity:.8;margin-top:2px}
  .pkgbtn.active{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.4)}

  /* Driver-found overlay */
  .df-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,23,.55);backdrop-filter: blur(6px);z-index:9999}
  .df-card{width:min(420px,92vw);border-radius:22px;padding:18px 18px 16px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg, rgba(15,23,42,.92), rgba(2,6,23,.92));box-shadow:0 18px 60px rgba(0,0,0,.45);text-align:center;position:relative;overflow:hidden}
  .df-icon{font-size:44px;line-height:1;margin-bottom:8px;filter: drop-shadow(0 10px 18px rgba(0,0,0,.35))}
  .df-title{font-weight:900;font-size:20px;letter-spacing:.2px}
  .df-sub{margin-top:6px;color:#cbd5e1;font-size:13px;line-height:1.25}
  
.df-sub2{font-size:15px; opacity:.85; margin-top:6px;}
.df-card:before{content:'';position:absolute;inset:-140px; background: radial-gradient(circle at 50% 50%, rgba(34,197,94,.22), transparent 55%); transform: scale(.6); opacity:0}
  .df-show .df-card{animation: dfPop .22s ease-out, dfFloat 1.8s ease-in-out}
  .df-show .df-card:before{animation: dfGlow 1.2s ease-out}
  @keyframes dfPop{from{transform: translateY(14px) scale(.92);opacity:0}to{transform: translateY(0) scale(1);opacity:1}}
  @keyframes dfFloat{0%,100%{transform: translateY(0)}50%{transform: translateY(-2px)}}
  @keyframes dfGlow{0%{opacity:0;transform:scale(.6)}20%{opacity:1}100%{opacity:0;transform:scale(1)}}

  /* Leaflet custom icon wrapper */
  .pt-car-icon{background:transparent;border:none}

  /* Chat modal */
  .chatOverlay{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.55);z-index:10000}
  .chatSheet{width:min(760px,100%);max-height:88vh;background:rgba(2,6,23,.96);border:1px solid rgba(148,163,184,.18);border-radius:18px 18px 0 0;overflow:hidden}
  .chatHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(148,163,184,.15)}
  .chatBody{padding:12px 14px;max-height:62vh;overflow:auto}
  .chatMsg{max-width:86%;padding:10px 12px;border-radius:14px;border:1px solid rgba(148,163,184,.18);background:rgba(148,163,184,.10);margin-bottom:8px;white-space:pre-wrap;word-break:break-word}
  .chatMe{margin-left:auto;background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.25)}
  .chatMeta{font-size:11px;opacity:.7;margin-top:4px}
  .chatFoot{padding:12px 14px;border-top:1px solid rgba(148,163,184,.15);display:flex;gap:10px;align-items:center}
  .chatFoot input{flex:1}
  .chatNote{font-size:12px;opacity:.75;margin-top:6px}
</style>

<script>
const NOMINATIM = 'https://nominatim.openstreetmap.org';


function fmtTs(v){
  if(v===null || v===undefined || v==='') return '';
  const n = Number(v);
  if(!Number.isFinite(n)) return '';
  const ms = n < 1e12 ? n*1000 : n; // seconds -> ms
  const d = new Date(ms);
  if(Number.isNaN(d.getTime())) return '';
  return d.toLocaleString();
}
let map, meMarker, fromMarker, toMarker, driverMarker;
let routeLine = null;
let lastRouteKey = '';
let driverRouteLine = null;
let lastDriverPos = null;
let lastAnnouncedStatus = '';
let lastDriverFoundOrderId = null;
let dfTimer = null;
let pickup = null;
let dropoff = null;
let activeOrderObj = null;
let activeOrderId = null;
let debounceT = null;
let pollTimer = null;
let driverTimer = null;

// Real-time stream (SSE) for active order
let orderStream = null;
let orderStreamId = null;
let lastStreamRefresh = 0;

// ETA (driver -> destination) throttling
let lastEtaAt = 0;
let lastEtaKey = '';

function getCarDivIcon(){
  // Lightweight SVG car icon (works without external assets)
  const svg = `
  <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 64 64">
    <defs>
      <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
      </filter>
    </defs>
    <g filter="url(#s)">
      <path d="M14 36l6-16c1-3 4-5 7-5h10c3 0 6 2 7 5l6 16" fill="#111827"/>
      <path d="M18 36h28c3 0 6 2 6 6v6H12v-6c0-4 3-6 6-6z" fill="#2563eb"/>
      <rect x="22" y="20" width="20" height="10" rx="2" fill="#60a5fa"/>
      <circle cx="20" cy="50" r="5" fill="#0b1220"/>
      <circle cx="44" cy="50" r="5" fill="#0b1220"/>
      <circle cx="20" cy="50" r="2" fill="#94a3b8"/>
      <circle cx="44" cy="50" r="2" fill="#94a3b8"/>
    </g>
  </svg>`;
  return L.divIcon({
    className: 'pt-car-icon',
    html: svg,
    iconSize: [34,34],
    iconAnchor: [17,17]
  });
}

async function osrmEta(from, to){
  if(!from || !to) return null;
  try{
    const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=false`;
    const r = await fetch(url);
    const j = await r.json().catch(()=>null);
    const rt = j?.routes?.[0];
    if(!rt) return null;
    const km = (Number(rt.distance)||0)/1000;
    const min = (Number(rt.duration)||0)/60;
    return { km, min };
  }catch(e){
    return null;
  }
}

function setEtaText(txt){
  const el = document.getElementById('rideEta');
  if(!el) return;
  if(!txt){
    el.style.display = 'none';
    el.textContent = '';
    return;
  }
  el.style.display = 'block';
  el.textContent = txt;
}

function stopOrderStream(){
  try{ if(orderStream) orderStream.close(); }catch(_){/* ignore */}
  orderStream = null;
  orderStreamId = null;
}

function applyDriverLocation(llObj){
  if(!llObj || !Number.isFinite(llObj.lat) || !Number.isFinite(llObj.lng)) return;

  if(!driverMarker) driverMarker = L.marker([llObj.lat, llObj.lng], { icon: getCarDivIcon() }).addTo(map).bindPopup('Sürücü');
  else driverMarker.setLatLng([llObj.lat, llObj.lng]);

  const fb = document.getElementById('focusDriverBtn');
  if (fb){
    fb.style.display = 'inline-block';
    fb.onclick = ()=> map.setView([llObj.lat, llObj.lng], Math.max(map.getZoom(), 14));
  }

  // live route update (driver -> pickup / driver -> dropoff)
  if (activeOrderObj){
    const st0 = String(activeOrderObj.status||'').toLowerCase();
    const st = (st0==='started') ? 'in_progress' : st0;
    let dest = null;
    if (st==='accepted' || st==='arrived' || st==='new'){
      if (Number.isFinite(activeOrderObj.pickup_lat) && Number.isFinite(activeOrderObj.pickup_lon)){
        dest = { lat: activeOrderObj.pickup_lat, lng: activeOrderObj.pickup_lon };
      }
    } else if (st==='in_progress'){
      if (Number.isFinite(activeOrderObj.dropoff_lat) && Number.isFinite(activeOrderObj.dropoff_lon)){
        dest = { lat: activeOrderObj.dropoff_lat, lng: activeOrderObj.dropoff_lon };
      }
    }
    const moved = metersBetween(lastDriverPos, llObj);
    lastDriverPos = llObj;
    // ETA: update every ~5s and when destination changes
    const etaKey = dest ? `${st}|${dest.lat.toFixed(5)},${dest.lng.toFixed(5)}` : '';
    const now2 = Date.now();
    if(dest && ((now2 - lastEtaAt) > 5000 || etaKey !== lastEtaKey)){
      lastEtaAt = now2;
      lastEtaKey = etaKey;
      osrmEta(llObj, dest).then(v=>{
        if(!v) return;
        const mm = Math.max(1, Math.round(v.min));
        setEtaText(`Sürücü çatır: ~${mm} dəq • ${round2(v.km)} km`);
      }).catch(()=>{});
    }
    if(!dest) setEtaText('');

    if (dest && (moved > 25 || !driverRouteLine)){
      updateOSRMLine(llObj, dest, { weight: 5, opacity: 0.9, dashArray: '8 10' }, driverRouteLine)
        .then(line => { driverRouteLine = line; })
        .catch(()=>{});
    }
  }
}

function startOrderStream(orderId){
  const oid = Number(orderId||0);
  if(!oid) return;
  if(orderStream && orderStreamId === oid) return;
  stopOrderStream();
  orderStreamId = oid;

  const url = `/api/orders/stream?order_id=${encodeURIComponent(oid)}&phone=${encodeURIComponent(s.phone)}&password=${encodeURIComponent(s.password)}`;
  try{ orderStream = new EventSource(url); }catch(_){ stopOrderStream(); return; }

  const onOrderUpdate = (ord)=>{
    if(!ord || Number(ord.id) !== oid) return;
    activeOrderObj = { ...(activeOrderObj||{}), ...ord };
    renderRideUI(activeOrderObj);

    const st = String(activeOrderObj.status||'').toLowerCase();
    if(['completed','cancelled'].includes(st)){
      loadMyOrders();
      return;
    }
    const now = Date.now();
    if (now - lastStreamRefresh > 1200){
      lastStreamRefresh = now;
      loadMyOrders();
    }
  };

  orderStream.addEventListener('snapshot', (ev)=>{
    try{ const msg = JSON.parse(ev.data||'{}'); onOrderUpdate(msg.order); }catch(_){/* ignore */}
  });
  orderStream.addEventListener('status', (ev)=>{
    try{ const msg = JSON.parse(ev.data||'{}'); onOrderUpdate(msg.order); }catch(_){/* ignore */}
  });
  orderStream.addEventListener('location', (ev)=>{
    try{
      const msg = JSON.parse(ev.data||'{}');
      if(Number(msg.order_id) !== oid) return;
      const loc = msg.location || {};
      applyDriverLocation({ lat: Number(loc.lat), lng: Number(loc.lng) });
    }catch(_){/* ignore */}
  });
  orderStream.onerror = ()=>{
    // polling remains as fallback
  };
}

async function cancelOrder(orderId){
  const id = parseInt(orderId, 10);
  if(!id) return;
  if(!confirm('Sifarişi ləğv etmək istəyirsiniz?')) return;
  setMsg('Ləğv edilir...');
  try{
    const r = await fetch('/api/orders/cancel', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone: s.phone, password: s.password, order_id: id })
    });
    const j = await r.json().catch(()=> ({}));
    if(j && j.success){
      setMsg('Sifariş ləğv olundu.');
      loadMyOrders();
    }else{
      setMsg((j && (j.error||j.message)) || 'NOT_CANCELLABLE');
    }
  }catch(e){
    setMsg('ERROR');
  }
}

function round2(n){ return Math.round((Number(n)||0)*100)/100; }

// Server-only estimate (single source of truth)
let lastEstimateReqId = 0;
let farePackages = [];
let selectedPackageId = 'economy';
let estimateReady = false;
let lastEstimate = null; // {km, minutes, fare, package_id}

function setSelectedPackage(id){
  selectedPackageId = String(id || 'economy');
  // Update UI
  const bar = document.getElementById('pkgBar');
  if(bar){
    Array.from(bar.querySelectorAll('.pkgbtn')).forEach(btn => {
      btn.classList.toggle('active', btn.dataset.id === selectedPackageId);
    });
  }
  // Refresh estimate immediately
  showEstimate();
  drawRoute();
}

async function loadPackages(){
  try{
    const r = await fetch('/api/fare-packages');
    const j = await r.json().catch(()=>null);
    if(j && j.success && Array.isArray(j.packages) && j.packages.length){
      farePackages = j.packages;
    }
  }catch(e){}

  if(!farePackages.length){
    farePackages = [{ id:'economy', name:'Ekonom' }];
  }

  const bar = document.getElementById('pkgBar');
  if(!bar) return;
  bar.style.display = 'flex';

  bar.innerHTML = farePackages.map(p=>{
    const id = String(p.id||'').toLowerCase();
    const name = p.name || id;
    return `<button class="pkgbtn" type="button" data-id="${id}" onclick="setSelectedPackage('${id}')">${name}</button>`;
  }).join('');

  // Keep previously selected if exists, else first
  const exists = farePackages.some(p => String(p.id).toLowerCase() === selectedPackageId);
  if(!exists) selectedPackageId = String(farePackages[0].id||'economy');
  setSelectedPackage(selectedPackageId);
}

async function estimateFare(km, minutes){
  const rid = ++lastEstimateReqId;
  try{
    const r = await fetch('/api/estimate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ km, minutes, package_id: selectedPackageId })
    });
    const j = await r.json().catch(()=>null);
    if(rid !== lastEstimateReqId) return null; // newer request exists
    if(j && j.success) return j;
  }catch(e){}
  return null;
}

// Prefer this for passenger preview: server computes OSRM route distance/duration
// so it ALWAYS matches order creation price.
async function estimateFareByCoords(){
  if(!pickup || !dropoff) return null;
  const rid = ++lastEstimateReqId;
  try{
    const r = await fetch('/api/estimate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pickup, dropoff, package_id: selectedPackageId })
    });
    const j = await r.json().catch(()=>null);
    if(rid !== lastEstimateReqId) return null;
    if(j && j.success) return j;
  }catch(e){}
  return null;
}

function getSession(){ try{ return JSON.parse(localStorage.getItem('pt_session')||'null'); }catch(e){ return null; } }
const s = getSession();
if(!s || s.role !== 'passenger'){ location.href='/'; }
document.getElementById('who').textContent = 'Müştəri: ' + (s.name||'') + ' • ' + (s.phone||'');

function setMsg(t){ document.getElementById('msg').textContent = t || ''; }

function beep(kind='info'){
  const enabled = document.getElementById('soundOn')?.checked;
  if (!enabled) return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = kind==='start' ? 880 : kind==='arrive' ? 660 : 520;
    g.gain.value = 0.08;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    setTimeout(()=>{ o.stop(); ctx.close(); }, 180);
  }catch(e){ /* ignore */ }
}

// Special “driver found” alert (sound + animation)
function playDriverFoundSound(){
  const enabled = document.getElementById('soundOn')?.checked;
  if (!enabled) return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const notes = [659, 784, 988]; // bright 3-tone chime
    const base = ctx.currentTime;
    notes.forEach((freq, i)=>{
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(freq, base + i*0.08);
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001, base + i*0.08);
      g.gain.exponentialRampToValueAtTime(0.12, base + i*0.08 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, base + i*0.08 + 0.18);
      o.start(base + i*0.08);
      o.stop(base + i*0.08 + 0.2);
    });
    setTimeout(()=>ctx.close().catch(()=>{}), 900);
  }catch(e){ /* ignore */ }
}

function triggerDriverFound(order){
  const id = order?.id;
  if(!id) return;
  const st = String(order?.status||'').toLowerCase();
  const hasDriver = !!(order?.driver_phone || order?.assigned_driver_phone);
  if(!hasDriver) return;
  if(!(st==='accepted' || st==='arrived' || st==='in_progress' || st==='started')) return;
  if(lastDriverFoundOrderId === id) return;
  lastDriverFoundOrderId = id;
  playDriverFoundSound();
  showDriverFoundOverlay(order);

function statusToStepIndex(status){
  let s = String(status||'').toLowerCase();
  if (s==='started') s = 'in_progress';
  if (s==='accepted') return 1;
  if (s==='arrived') return 2;
  if (s==='in_progress') return 3;
  if (s==='completed') return 4;
  return 0;
}

function statusLabel(status){
  let s = String(status||'').toLowerCase();
  if (s==='started') s = 'in_progress';
  if (s==='accepted') return 'Sürücü qəbul etdi';
  if (s==='arrived') return 'Sürücü gəldi';
  if (s==='in_progress') return 'Ride başladı';
  if (s==='completed') return 'Tamamlandı';
  if (s==='cancelled') return 'Ləğv olundu';
  return 'Sürücü axtarılır';
}

async function renderRideUI(order){
  const box = document.getElementById('rideUI');
  if(!box) return;
  if(!order || !order.id){
    box.style.display='none';
    setOrderFormHidden(false);
    setEtaText('');
    const drvEl0 = document.getElementById('rideDriver');
    if (drvEl0) { drvEl0.style.display='none'; drvEl0.innerHTML=''; }
    const cancelRow0 = document.getElementById('rideCancelRow');
    if (cancelRow0) cancelRow0.style.display='none';
    return;
  }
  box.style.display='block';

  // After driver accepts (and during active ride), hide the order form so it won't reopen.
  // Cancellation remains available inside the active order card.
  const curSt = String(order.status||'new').toLowerCase();
  setOrderFormHidden(['accepted','arrived','started','in_progress'].includes(curSt));

  document.getElementById('rideTitle').textContent = 'Sifariş #' + order.id;
  // Subtitle: status + fare (estimate/live)
  try{
    const cur = String(order.status||'').toLowerCase();
    if(cur==='in_progress' || cur==='started'){
      const km = Number(order.real_km || 0);
      let mins = 0;
      if(order.started_at){
        const t0 = new Date(order.started_at).getTime();
        if(Number.isFinite(t0) && t0>0) mins = Math.max(0, (Date.now()-t0)/60000);
      }
      document.getElementById('rideSub').textContent = `Başladı • Gedilən: ${round2(km)} km • Canlı: ...`;
      const est = await estimateFare(km, mins);
      if(est) document.getElementById('rideSub').textContent = `Başladı • Gedilən: ${round2(km)} km • Canlı: ${Number(est.fare).toFixed(2)} AZN`;
    }else if(order.est_km!=null && order.est_fare!=null){
      document.getElementById('rideSub').textContent = `${statusLabel(order.status)} • Təxmini: ${round2(order.est_km)} km • ${round2(order.est_fare)} AZN`;
    }else{
      document.getElementById('rideSub').textContent = statusLabel(order.status);
    }
  }catch(e){
    document.getElementById('rideSub').textContent = statusLabel(order.status);
  }
  const pill = document.getElementById('ridePill');
  pill.textContent = order.status || 'new';

  // Driver info line (shows when driver is assigned/accepted)
  const drvEl = document.getElementById('rideDriver');
  if (drvEl){
    const dp = order.driver_phone || order.assigned_driver_phone || '';
    if (dp){
      const tel = `<a href="tel:${dp}">${dp}</a>`;
      const nm = order.driver_name ? ` • ${escapeHtml(order.driver_name)}` : '';
      const carBits = [];
      if (order.driver_car_make) carBits.push(escapeHtml(order.driver_car_make));
      if (order.driver_car_model) carBits.push(escapeHtml(order.driver_car_model));
      const plate = order.driver_car_plate ? escapeHtml(order.driver_car_plate) : '';
      const color = order.driver_car_color ? escapeHtml(order.driver_car_color) : '';
      const year = order.driver_car_year ? escapeHtml(String(order.driver_car_year)) : '';
      const carLine = (carBits.length || plate || color || year)
        ? `<div class="muted" style="margin-top:3px"><b>Avto:</b> ${carBits.join(' ')}${plate?(' • '+plate):''}${color?(' • '+color):''}${year?(' • '+year):''}</div>`
        : '';
      drvEl.innerHTML = `<b>Sürücü:</b> ${tel}${nm}${carLine}`;
      drvEl.style.display='block';
    } else {
      drvEl.style.display='none';
      drvEl.innerHTML='';
    }
  }

  // Bolt-like alert when a driver is found (only once per order)
  try{ triggerDriverFound(order); }catch(e){}

  // Passenger cancel button (allowed before ride starts)
  const canCancel = ['new','accepted','arrived'].includes(curSt) && !(Number(order.started_at||0) > 0) && curSt!=='in_progress' && curSt!=='completed' && curSt!=='cancelled';
  const cancelRow = document.getElementById('rideCancelRow');
  const cancelBtn = document.getElementById('rideCancelBtn');
  if (cancelRow && cancelBtn){
    if (canCancel){
      cancelRow.style.display='flex';
      cancelBtn.onclick = ()=> cancelOrder(order.id);
    } else {
      cancelRow.style.display='none';
      cancelBtn.onclick = null;
    }
  }

  const idx = statusToStepIndex(order.status);
  const steps = ['Axtarış','Qəbul','Gəldi','Başladı','Bitdi'];
  const wrap = document.getElementById('rideSteps');
  wrap.innerHTML = '';
  steps.forEach((t,i)=>{
    const d = document.createElement('div');
    d.className = 'step' + (i<idx ? ' done' : i===idx ? ' active' : '');
    d.textContent = t;
    wrap.appendChild(d);
  });
  document.getElementById('rideProgress').style.width = Math.round((idx/4)*100) + '%';

  // Chat button visibility (accepted/arrived/in_progress write; completed/cancelled read-only)
  try{
    const btn = document.getElementById('chatBtn');
    const st = String(order.status||'').toLowerCase();
    const show = ['accepted','arrived','in_progress','completed','cancelled'].includes(st) && !!(order.driver_phone || order.assigned_driver_phone);
    if(btn){
      btn.style.display = show ? 'inline-block' : 'none';
      btn.textContent = (st==='completed' || st==='cancelled') ? 'Chat (oxu)' : 'Chat';
    }
  }catch(e){}

  const cur = String(order.status||'').toLowerCase();
  if (cur && cur !== lastAnnouncedStatus){
    lastAnnouncedStatus = cur;
    if (cur==='accepted') beep('info');
    if (cur==='arrived') beep('arrive');
    if (cur==='in_progress') beep('start');
    if (cur==='completed') beep('info');
  }
}

async function loadChat(reset){
  if(!chatOrderId) return;
  const body = document.getElementById('chatBody');
  const inp = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const note = document.getElementById('chatNote');
  const qs = new URLSearchParams({
    order_id: chatOrderId,
    role: 'passenger',
    phone: s.phone,
    password: s.password,
    since_id: chatLastId
  });
  try{
    const res = await fetch('/api/orders/chat?' + qs.toString());
    const ct = (res.headers.get('content-type') || '').toLowerCase();
    if(!ct.includes('application/json')){
      if(note) note.textContent = 'Xəta: HTTP_' + res.status;
      chatCanWrite = false;
      if(inp) inp.disabled = true;
      if(btn) btn.disabled = true;
      if(reset && body) body.innerHTML = '';
      return;
    }
    const data = await res.json().catch(()=>({}));
    if(!data.success){
      const err = data.error || 'ERROR';
      if(note) note.textContent = (err==='CHAT_DISABLED') ? 'Chat admin tərəfindən deaktiv edilib.' : ('Xəta: ' + err);
      chatCanWrite = false;
      if(inp) inp.disabled = true;
      if(btn) btn.disabled = true;
      if(reset && body) body.innerHTML = '';
      return;
    }
    const canWrite = !!data.can_write;
    chatCanWrite = canWrite;
    if(inp) inp.disabled = !canWrite;
    if(btn) btn.disabled = !canWrite;
    if(note) note.textContent = canWrite ? '' : 'Bu mərhələdə yalnız oxumaq mümkündür.';

    const msgs = Array.isArray(data.messages) ? data.messages : [];
    if(reset) body.innerHTML = '';
    if(msgs.length){
      const atBottom = Math.abs(body.scrollHeight - body.scrollTop - body.clientHeight) < 40;
      for(const x of msgs){
        chatLastId = Math.max(chatLastId, Number(x.id)||chatLastId);
        body.insertAdjacentHTML('beforeend', renderChatMsg(x));
      }
      if(atBottom || reset) body.scrollTop = body.scrollHeight;
    }
  }catch(e){
    if(note) note.textContent = 'Şəbəkə xətası.';
  }
}

async function sendChat(){
  if(!chatOrderId || !chatCanWrite) return;
  const inp = document.getElementById('chatInput');
  const note = document.getElementById('chatNote');
  const txt = String(inp.value||'').trim();
  if(!txt) return;
  inp.value = '';
  try{
    const res = await fetch('/api/orders/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ order_id: chatOrderId, role:'passenger', phone:s.phone, password:s.password, message: txt })
    });
    const ct = (res.headers.get('content-type') || '').toLowerCase();
    if(!ct.includes('application/json')){
      // Usually means server wasn't updated (404 HTML) or crashed and returned HTML.
      if(note) note.textContent = 'Xəta: HTTP_' + res.status;
      return;
    }
    const data = await res.json().catch(()=>({}));
    if(!data.success){
      if(note) note.textContent = (data.error==='READ_ONLY') ? 'Bu mərhələdə yazmaq olmaz.' : ('Xəta: ' + (data.error||'ERROR'));
      return;
    }
    await loadChat(false);
  }catch(e){
    if(note) note.textContent = 'Şəbəkə xətası.';
  }
}

// Tiny HTML escape for safe inline rendering
function escapeHtml(s){
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function metersBetween(a,b){
  if(!a||!b) return 1e9;
  const R=6371000;
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(b.lat-a.lat);
  const dLon=toRad(b.lng-a.lng);
  const lat1=toRad(a.lat);
  const lat2=toRad(b.lat);
  const s=Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

async function updateOSRMLine(from, to, opts, existingLine){
  if(!from||!to) return existingLine;
  try{
    const url = `https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;
    const r = await fetch(url);
    const j = await r.json();
    const coords = j?.routes?.[0]?.geometry?.coordinates;
    if(!coords || coords.length<2) return existingLine;
    const latlngs = coords.map(c=>[c[1], c[0]]);
    if (existingLine) map.removeLayer(existingLine);
    return L.polyline(latlngs, opts).addTo(map);
  }catch(e){ return existingLine; }
}

function havKm(lat1, lon1, lat2, lon2){
  const toRad = d => (d*Math.PI)/180;
  const R = 6371;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}
async function drawRoute(){
  if(!pickup || !dropoff){
    if(routeLine){ try{ map.removeLayer(routeLine); }catch(e){} routeLine=null; }
    lastRouteKey='';
    return;
  }
  const key = `${pickup.lat.toFixed(5)},${pickup.lon.toFixed(5)}|${dropoff.lat.toFixed(5)},${dropoff.lon.toFixed(5)}`;
  if(key === lastRouteKey) return;
  lastRouteKey = key;

  if(routeLine){ try{ map.removeLayer(routeLine); }catch(e){} routeLine=null; }

  try{
    const url = `https://router.project-osrm.org/route/v1/driving/${pickup.lon},${pickup.lat};${dropoff.lon},${dropoff.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json().catch(()=>null);
    const r = data && data.routes && data.routes[0];
    if(r && r.geometry && r.geometry.coordinates && r.geometry.coordinates.length){
      const coords = r.geometry.coordinates.map(c => [c[1], c[0]]);
      routeLine = L.polyline(coords, {weight:5, opacity:0.9}).addTo(map);
      map.fitBounds(routeLine.getBounds(), {padding:[20,20]});
      return;
    }
  }catch(e){}

  // fallback straight line
  routeLine = L.polyline([[pickup.lat,pickup.lon],[dropoff.lat,dropoff.lon]], {dashArray:'6,8', weight:4, opacity:0.8}).addTo(map);
  map.fitBounds(routeLine.getBounds(), {padding:[20,20]});
}

async function loadMyOrders(){
  const res = await fetch('/api/orders/my?phone=' + encodeURIComponent(s.phone) + '&password=' + encodeURIComponent(s.password));
  const data = await res.json().catch(()=> ({}));
  const box = document.getElementById('orders');
  if(!data.success){ box.innerHTML = '<div style="opacity:.7">Sifarişlər yüklənmədi.</div>'; return; }

  // Defensive: dedupe by order id (can happen if DB has duplicate driver rows and JOIN multiplies results)
  const raw = Array.isArray(data.orders) ? data.orders : [];
  const byId = new Map();
  for (const o of raw){
    const id = Number(o && o.id);
    if (!id) continue;
    if (!byId.has(id)) byId.set(id, o);
  }
  const orders = Array.from(byId.values()).sort((a,b)=> Number(b.id||0) - Number(a.id||0));

  if(!orders.length){ box.innerHTML = '<div style="opacity:.7">Hələ sifariş yoxdur.</div>'; return; }

  box.innerHTML = orders.map(o => {
    const dt = fmtTs(o.created_at);
    const pkgLine = (o.fare_package) ? `<span class="pill" style="margin-left:6px">${o.fare_package}</span>` : '';
    const driverLine = o.driver_phone ? (() => {
      const tel = `<a href="tel:${o.driver_phone}" style="color:#93c5fd;text-decoration:none">${o.driver_phone}</a>`;
      const nm = o.driver_name ? ` • ${o.driver_name}` : '';
      const car = (o.driver_car_make || o.driver_car_model || o.driver_car_plate || o.driver_car_color || o.driver_car_year)
        ? `<div style="opacity:.9;margin-top:4px"><b>Avto:</b> ${(o.driver_car_make||'')}${(o.driver_car_model?' '+o.driver_car_model:'')}${(o.driver_car_plate?' • '+o.driver_car_plate:'')}${(o.driver_car_color?' • '+o.driver_car_color:'')}${(o.driver_car_year?' • '+o.driver_car_year:'')}</div>`
        : '';
      return `<div style="opacity:.9;margin-top:4px"><b>Sürücü:</b> ${tel}${nm}</div>${car}`;
    })() : '';
    const estLine = (o.est_fare != null) ? `<div style="opacity:.9;margin-top:4px"><b>Təxmini:</b> ${Number(o.est_km||0).toFixed(1)} km • ${o.est_fare} AZN</div>` : '';

    const st = String(o.status||'').toLowerCase();
    const stText = (st==='cancelled') ? 'Ləğv olundu' : (st==='completed' ? 'Uğurlu' : (o.status||''));
    const stStyle = (st==='cancelled') ? 'border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.18);color:#fecaca;' :
                    (st==='completed') ? 'border-color:rgba(34,197,94,.55);background:rgba(34,197,94,.16);color:#bbf7d0;' : '';

    const canCancel = (st==='new' || st==='accepted') && !(Number(o.started_at||0) > 0) && st!=='in_progress' && st!=='completed' && st!=='cancelled';
    const cancelBtn = canCancel ? `<div class="row" style="margin-top:10px"><button class="secondary" onclick="cancelOrder(${o.id})">Sifarişi ləğv et</button></div>` : '';
    return `<div style="padding:10px 0;border-bottom:1px solid rgba(148,163,184,.12)">
      <div><b>#${o.id}</b> <span class="pill" style="${stStyle}">${stText}</span>${pkgLine}</div>
      <div style="opacity:.9;margin-top:4px"><b>Haradan:</b> ${o.pickup_text}</div>
      <div style="opacity:.9;margin-top:4px"><b>Haraya:</b> ${o.dropoff_text}</div>
      ${estLine}
      ${driverLine}
      <div style="opacity:.65;margin-top:4px">${dt}</div>
      ${cancelBtn}
    </div>`;
  }).join('');

  const active = orders.find(o => ['accepted','arrived','started','in_progress'].includes(String(o.status||'').toLowerCase()) && o.driver_phone);
  if(active){
    activeOrderObj = active;
    activeOrderId = active.id;
    renderRideUI(active);
    startOrderStream(activeOrderId);
    await refreshDriverLocation();
    if (!driverTimer){
      driverTimer = setInterval(refreshDriverLocation, 2000);
    }
  } else {
    // If a driver hasn't been assigned yet, still show the order card so the passenger can cancel.
    // Otherwise the UI shows only "Sifariş yaradıldı" and the user can't cancel while searching.
    const pending = orders.find(o => ['new','searching'].includes(String(o.status||'').toLowerCase()));
    if(pending){
      activeOrderObj = pending;
      activeOrderId = pending.id;
      renderRideUI(pending);
      startOrderStream(activeOrderId);
      // no driver marker/route until a driver is assigned
      if (driverTimer){ clearInterval(driverTimer); driverTimer=null; }
      if(driverMarker){ map.removeLayer(driverMarker); driverMarker=null; }
      if(driverRouteLine){ map.removeLayer(driverRouteLine); driverRouteLine=null; }
      lastDriverPos = null;
    } else {
      activeOrderObj = null;
      activeOrderId = null;
      renderRideUI(null);
      stopOrderStream();
      if (driverTimer){ clearInterval(driverTimer); driverTimer=null; }
      if(driverMarker){ map.removeLayer(driverMarker); driverMarker=null; }
      if(driverRouteLine){ map.removeLayer(driverRouteLine); driverRouteLine=null; }
      lastDriverPos = null;
    }
  }
}

async function trackDriver(driverPhone){
  // backward compatible wrapper
  if (!activeOrderObj && activeOrderId){
    activeOrderObj = { id: activeOrderId, driver_phone: driverPhone };
  }
  return refreshDriverLocation();
}

async function refreshDriverLocation(){
  try{
    if(!activeOrderId) return;
    const res = await fetch('/api/orders/driver_location?order_id=' + encodeURIComponent(activeOrderId) + '&phone=' + encodeURIComponent(s.phone) + '&password=' + encodeURIComponent(s.password));
    const data = await res.json().catch(()=> ({}));
    if(!data.success || !data.location) return;
    const llObj = { lat: data.location.lat, lng: data.location.lng };
    if(!Number.isFinite(llObj.lat) || !Number.isFinite(llObj.lng)) return;
    applyDriverLocation(llObj);
  }catch(e){}
}

function startPolling(){
  if(pollTimer) return;
  pollTimer = setInterval(loadMyOrders, 5000);
}

loadPackages();
initMap();
useMyLocation();
loadMyOrders();
startPolling();
</script>
</body>
</html>
