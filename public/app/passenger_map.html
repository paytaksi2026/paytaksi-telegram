<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Passenger Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
html,body{margin:0;height:100%;font-family:Arial}
#map{height:100%}
#statusBox{position:fixed;top:10px;left:10px;background:white;padding:10px;border-radius:8px}
</style>
</head>
<body>

<div id="map"></div>
<div id="statusBox">Sifariş statusu...</div>

<script>
const phone=localStorage.getItem("phone");
const password=localStorage.getItem("password");

const map=L.map('map').setView([40.4093,49.8671],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let driverMarker=null;

async function loadOrder(){
const r=await fetch(`/api/orders/my?phone=${phone}&password=${password}`);
const d=await r.json();
if(!d.success||!d.orders.length) return;
const o=d.orders[0];
document.getElementById("statusBox").innerText="Status: "+o.status;
if(o.driver_phone){
loadDriver(o.id);
}
}
async function loadDriver(orderId){
const r=await fetch(`/api/orders/driver_location?phone=${phone}&password=${password}&order_id=${orderId}`);
const d=await r.json();
if(d.success && d.location){
if(!driverMarker){
driverMarker=L.marker([d.location.lat,d.location.lng]).addTo(map);
}else{
driverMarker.setLatLng([d.location.lat,d.location.lng]);
}
map.setView([d.location.lat,d.location.lng],15);
}
}
setInterval(loadOrder,5000);
</script>

</body>
</html>
