<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sürücü - Sifariş Tarixçəsi</title>
<style>
body{margin:0;background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:18px}
.card{background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);
border-radius:14px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button{padding:8px 12px;border-radius:8px;border:none;background:#3b82f6;color:white;font-weight:700;cursor:pointer}

.status-success{
  background:rgba(34,197,94,.15);
  border:1px solid rgba(34,197,94,.55);
  color:#bbf7d0;
}

.status-cancel{
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.55);
  color:#fecaca;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <h2>Sifariş Tarixçəsi</h2>
      <a href="/app/driver.html" style="color:#3b82f6;text-decoration:none;font-weight:700">← Geri</a>
    </div>
    <div id="historyBox" style="margin-top:16px"></div>
    <div class="row" style="justify-content:center;margin-top:16px">
      <button onclick="prevPage()">Əvvəlki</button>
      <button onclick="nextPage()">Sonrakı</button>
    </div>
  </div>
</div>

<script>
function getSession(){ try{ return JSON.parse(localStorage.getItem('pt_session')||'null'); }catch(e){ return null; } }
const s = getSession();
if(!s || s.role !== 'driver'){ location.href='/'; }

let currentPage = 1;
const perPage = 5;
let allOrders = [];

async function loadHistory(){
  const qs = new URLSearchParams({ phone:s.phone, password:s.password });
  const res = await fetch('/api/orders/driver/my?' + qs.toString());
  const data = await res.json();
  if(!data.success) return;
  allOrders = data.orders || [];
  renderPage();
}

function renderPage(){
  const start = (currentPage-1)*perPage;
  const pageOrders = allOrders.slice(start, start+perPage);
  const box = document.getElementById('historyBox');

  if(!pageOrders.length){
    box.innerHTML = '<div style="opacity:.75">Sifariş yoxdur.</div>';
    return;
  }

  box.innerHTML = pageOrders.map(o=>{
    let statusClass = '';
    if(o.status === 'completed') statusClass = 'status-success';
    if(o.status === 'cancelled') statusClass = 'status-cancel';

    return `
    <div class="${statusClass}" style="padding:12px;border-radius:10px;margin-bottom:10px">
      <div><b>#${o.id}</b> — ${o.status}</div>
      <div style="margin-top:6px"><b>Haradan:</b> ${o.pickup_text}</div>
      <div style="margin-top:6px"><b>Haraya:</b> ${o.dropoff_text}</div>
      <div style="margin-top:6px;opacity:.7">${new Date(o.created_at).toLocaleString()}</div>
    </div>
    `;
  }).join('');
}

function nextPage(){
  if((currentPage*perPage) < allOrders.length){
    currentPage++;
    renderPage();
  }
}

function prevPage(){
  if(currentPage>1){
    currentPage--;
    renderPage();
  }
}

loadHistory();
</script>
</body>
</html>
