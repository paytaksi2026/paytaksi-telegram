<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayTaksi - Müştəri Qeydiyyat</title>
<link rel="stylesheet" href="/assets/bolt.css" />
<style>
  body{background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
  .card{width:min(560px,92vw);background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h2{margin:0 0 10px 0;text-align:center;font-weight:800}
  .row{display:flex;gap:10px}
  input,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb;box-sizing:border-box}
  input::placeholder{color:rgba(226,232,240,.55)}
  button{cursor:pointer;border:none;background:#22c55e;color:#081014;font-weight:800}
  button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
  .msg{margin-top:12px;text-align:center;min-height:22px}
  .links{display:flex;gap:10px;margin-top:10px}
  .hint{opacity:.8;font-size:12px;text-align:center;margin-top:10px}
</style>
</head>
<body>
  <div class="card">
    <h2>Müştəri Qeydiyyat</h2>

    <input id="name" placeholder="Ad Soyad" autocomplete="name" />

    <div class="row" style="margin-top:8px">
      <input id="phonePrefix" value="+994" readonly />
      <input id="phoneDigits" placeholder="77XXXXXXX" autocomplete="tel" inputmode="numeric" maxlength="9" pattern="[0-9]{9}" />
    </div>

    <input id="password" type="password" placeholder="Şifrə" autocomplete="new-password" style="margin-top:8px" />

    <div class="row" style="margin-top:10px">
      <button type="button" onclick="registerUser()">Qeydiyyat</button>
      <button class="secondary" type="button" onclick="location.href='/passenger_login.html'">Giriş</button>
    </div>

    <div class="links">
      <button class="secondary" type="button" onclick="location.href='/'">Ana səhifə</button>
      <button class="secondary" type="button" onclick="location.href='/driver_register.html'">Sürücü qeydiyyat</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint">Qeydiyyatdan sonra müştəri girişi edin.</div>
  </div>

<script>
const msg = document.getElementById('msg');
const phoneDigits = document.getElementById('phoneDigits');
const password = document.getElementById('password');
const name = document.getElementById('name');

function setMsg(t){ msg.textContent = t || ''; }
function fullPhone(){
  const d = String(phoneDigits.value||'').replace(/\D/g,'');
  return '+994' + d;
}

async function registerUser(){
  setMsg('...');
  const res = await fetch('/api/register', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ phone: fullPhone(), password: password.value, role: 'passenger', name: name.value })
  });
  const data = await res.json().catch(()=> ({}));
  if(data.success){
    setMsg('Qeydiyyat tamamlandı. İndi "Giriş" edin.');
  }else{
    if(data.error === 'PHONE_ROLE_EXISTS') setMsg('Bu nömrə artıq qeydiyyatlıdır. "Giriş" edin.');
    else setMsg(data.error || 'ERROR');
  }
}

phoneDigits.addEventListener('input', ()=>{ phoneDigits.value = String(phoneDigits.value||'').replace(/\D/g,'').slice(0,9); });
</script>
</body>
</html>
