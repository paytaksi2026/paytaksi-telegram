<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayTaksi - Sürücü Qeydiyyat</title>

<style>
  body{background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
  .card{width:min(560px,92vw);background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h2{margin:0 0 12px 0;text-align:center;font-weight:800}
  input,select,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb;box-sizing:border-box}
  input::placeholder{color:rgba(226,232,240,.55)}
  .row{display:flex;gap:10px}
  .row > *{flex:1}
  button{cursor:pointer;border:none;background:#22c55e;color:#081014;font-weight:800}
  button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
  .msg{margin-top:12px;text-align:center;min-height:22px}
  .hint{opacity:.8;font-size:12px;text-align:center;margin-top:10px}
  .links{display:flex;gap:10px;margin-top:10px}
  .links a{flex:1;text-decoration:none}
</style>
<link rel="stylesheet" href="/assets/bolt.css" />

</head>
<body>
  <div class="card">
    <h2>Sürücü Qeydiyyat</h2>

    <div class="row">
      <input id="phonePrefix" value="+994" readonly />
      <input id="phoneDigits" placeholder="77XXXXXXX" autocomplete="tel" inputmode="numeric" maxlength="9" pattern="[0-9]{9}" />
    </div>
    <input id="password" type="password" placeholder="Şifrə (min 4)" autocomplete="new-password" />
    <input id="name" placeholder="Ad Soyad" autocomplete="name" style="margin-top:6px" />

    
      <div class="row" style="margin-top:6px">
        <input id="car_make" placeholder="Avtomobil markası (məs: Toyota)" />
        <input id="car_model" placeholder="Model (məs: Aqua)" />
      </div>
      <div class="row" style="margin-top:6px">
        <input id="car_plate" placeholder="Nömrə (məs: 90 YX 581)" />
        <select id="car_color">
          <option value="">Rəng seçin</option>
          <option value="ağ">ağ</option><option value="qara">qara</option><option value="sarı">sarı</option>
          <option value="qırmızı">qırmızı</option><option value="göy">göy</option><option value="yaşıl">yaşıl</option><option value="boz">boz</option>
        </select>
      </div>
      <input id="car_year" placeholder="İstehsal ili (2007+)" inputmode="numeric" maxlength="4" style="margin-top:6px" />


    <div class="row" style="margin-top:8px">
      <button type="button" onclick="doRegister()">Qeydiyyat</button>
      <button class="secondary" type="button" onclick="goBack()">Geri</button>
    </div>

    <div class="row" style="margin-top:10px">
      <button class="secondary" type="button" onclick="goLogin()">Daxil ol</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint">Sürücü hesabı admin təsdiqindən sonra aktiv olur.</div>
  </div>

<script>
const ROLE = "driver";
const msg = document.getElementById('msg');
const phoneDigits = document.getElementById('phoneDigits');
const password = document.getElementById('password');
const nameEl = document.getElementById('name');

function showMsg(t, ok=false) {
  msg.style.color = ok ? '#86efac' : '#fca5a5';
  msg.textContent = t || '';
}

function normPhone() {
  const digits = String(phoneDigits.value||'').replace(/\D/g,'').slice(0,9);
  return '+994' + digits;
}

function goBack() { window.location.href = "/driver_login.html"; }
function goLogin() { window.location.href = "/driver_login.html"; }

async function doRegister() {
  try {
    showMsg('...');
    const phone = normPhone();
    const pass = String(password.value||'');
    const payload = {
      phone, password: pass, role: ROLE,
      name: String(nameEl.value||'').trim()
    };
    if (ROLE === 'driver') {
      payload.car_make = (document.getElementById('car_make')?.value||'').trim();
      payload.car_model = (document.getElementById('car_model')?.value||'').trim();
      payload.car_plate = (document.getElementById('car_plate')?.value||'').trim();
      payload.car_color = (document.getElementById('car_color')?.value||'').trim();
      payload.car_year = (document.getElementById('car_year')?.value||'').trim();
    }
    const r = await fetch('/api/register', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const j = await r.json();
    if (!j || !j.success) {
      const e = (j && (j.error||j.message)) || 'REGISTER_FAILED';
      showMsg(e);
      return;
    }
    if (ROLE === 'driver' && String(j.approved||0) === '0') {
      showMsg('Qeydiyyat tamamlandı. Admin təsdiqi gözləyir.', true);
      setTimeout(()=>goLogin(), 800);
      return;
    }
    showMsg('Qeydiyyat tamamlandı. İndi daxil ola bilərsiniz.', true);
    setTimeout(()=>goLogin(), 700);
  } catch(e) {
    showMsg('NETWORK_ERROR');
  }
}
</script>
</body>
</html>
