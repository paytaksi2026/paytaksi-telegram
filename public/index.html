<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayTaksi</title>
<style>
  body{background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
  .card{width:min(560px,92vw);background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h2{margin:0 0 12px 0;text-align:center;font-weight:700}
  select,input,button{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb;box-sizing:border-box}
  input::placeholder{color:rgba(226,232,240,.55)}
  .row{display:flex;gap:10px}
  button{cursor:pointer;border:none;background:#22c55e;color:#081014;font-weight:700}
  button.secondary{background:rgba(148,163,184,.15);color:#e5e7eb;border:1px solid rgba(148,163,184,.25)}
  .tabs{display:flex;gap:10px;margin:2px 0 10px 0}
  .tabBtn{padding:10px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.25);background:rgba(148,163,184,.08);color:#e5e7eb;font-weight:700}
  .tabBtn.active{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.35);}
  .msg{margin-top:12px;text-align:center;min-height:22px}
  .hint{opacity:.8;font-size:12px;text-align:center;margin-top:10px}
</style>

<link rel="stylesheet" href="/assets/bolt.css" />
</head>
<body>
  <div class="card">
    <h2>PayTaksi</h2>

    <div class="tabs">
      <button id="tabLogin" class="tabBtn active" type="button" onclick="setMode('login')">Giriş</button>
      <button id="tabRegister" class="tabBtn" type="button" onclick="setMode('register')">Qeydiyyat</button>
    </div>

    <select id="role">
      <option value="passenger">Müştəri</option>
      <option value="driver">Sürücü</option>
    </select>

    <div class="row">
      <input id="phonePrefix" value="+994" readonly />
      <input id="phoneDigits" placeholder="77XXXXXXX" autocomplete="tel" inputmode="numeric" maxlength="9" pattern="[0-9]{9}" />
    </div>
    <input id="password" type="password" placeholder="Şifrə" autocomplete="current-password" />

    <div id="registerFields" style="display:none">
      <input id="name" placeholder="Ad Soyad" autocomplete="name" />

      <div id="driverFields" style="display:none;margin-top:6px">
        <div class="row">
          <input id="car_make" placeholder="Avtomobil markası" />
          <input id="car_model" placeholder="Model" />
        </div>
        <div class="row" style="margin-top:6px">
          <input id="car_plate" placeholder="Nömrə (məs: 90 YX 581)" />
          <select id="car_color">
            <option value="">Rəng</option>
            <option value="ağ">ağ</option>
            <option value="qara">qara</option>
            <option value="sarı">sarı</option>
            <option value="qırmızı">qırmızı</option>
            <option value="göy">göy</option>
            <option value="yaşıl">yaşıl</option>
            <option value="boz">boz</option>
          </select>
        </div>
        <input id="car_year" placeholder="İstehsal ili (2007+)" inputmode="numeric" maxlength="4" style="margin-top:6px" />
      </div>
    </div>

    <div class="row" style="margin-top:8px">
      <button id="btnPrimary" onclick="loginUser()">Daxil ol</button>
      <button id="btnSecondary" class="secondary" onclick="setMode('register')">Qeydiyyat</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint">Sürücü hesabı üçün admin təsdiqi lazımdır.</div>
  </div>

<script>
// --- DOM refs (do NOT rely on id->global mapping; some mobile browsers disable it)
const msg = document.getElementById('msg');
const role = document.getElementById('role');
const phonePrefix = document.getElementById('phonePrefix');
const phoneDigits = document.getElementById('phoneDigits');
const password = document.getElementById('password');
const registerFields = document.getElementById('registerFields');
const name = document.getElementById('name');
const driverFields = document.getElementById('driverFields');
const car_make = document.getElementById('car_make');
const car_model = document.getElementById('car_model');
const car_plate = document.getElementById('car_plate');
const car_color = document.getElementById('car_color');
const car_year = document.getElementById('car_year');

const tabLogin = document.getElementById('tabLogin');
const tabRegister = document.getElementById('tabRegister');
const btnPrimary = document.getElementById('btnPrimary');
const btnSecondary = document.getElementById('btnSecondary');

let mode = 'login';

function setMode(m){
  mode = (m === 'register') ? 'register' : 'login';
  const isReg = (mode === 'register');
  tabLogin.classList.toggle('active', !isReg);
  tabRegister.classList.toggle('active', isReg);
  registerFields.style.display = isReg ? 'block' : 'none';
  btnPrimary.textContent = isReg ? 'Qeydiyyat' : 'Daxil ol';
  btnPrimary.onclick = isReg ? registerUser : loginUser;
  btnSecondary.textContent = isReg ? 'Giriş' : 'Qeydiyyat';
  btnSecondary.onclick = () => setMode(isReg ? 'login' : 'register');
  driverFields.style.display = (isReg && role.value === 'driver') ? 'block' : 'none';
  setMsg('');
}

function setMsg(t){ msg.textContent = t || ''; }

function fullPhone(){
  const d = String(phoneDigits.value||'').replace(/\D/g,'');
  return '+994' + d;
}

function saveSession(s){
  localStorage.setItem('pt_session', JSON.stringify(s));
}
function getSession(){
  try{ return JSON.parse(localStorage.getItem('pt_session')||'null'); }catch(e){ return null; }
}
function clearSession(){ localStorage.removeItem('pt_session'); }

async function registerUser(){
  setMsg('...');
  const res = await fetch('/api/register', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ phone: fullPhone(), password: password.value, role: role.value, name: name.value,
      car_make: car_make?.value, car_model: car_model?.value, car_plate: car_plate?.value, car_color: car_color?.value, car_year: car_year?.value })
  });
  const data = await res.json();
  if(data.success){
    if(role.value === 'driver'){
      setMsg('Hörmətli ' + (name.value||'') + ', sürücü qeydiyyatı tamamlandı. Admin təsdiqi gözlənilir.');
    } else {
      setMsg('Hörmətli ' + (name.value||'') + ', siz qeydiyyatdan keçdiniz. İndi "Daxil ol" edin.');
    }
  }else{
    if(data.error === 'PHONE_ROLE_EXISTS') setMsg('Bu telefon bu rol üçün artıq qeydiyyatdan keçib. "Daxil ol" edin.');
    else setMsg(data.error || 'ERROR');
  }
}

async function loginUser(){
  setMsg('...');
  const res = await fetch('/api/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ phone: fullPhone(), password: password.value, role: role.value })
  });
  const data = await res.json();
  if(data.pending){
    setMsg('Sürücü hesabı admin təsdiqi gözləyir.');
    return;
  }
  if(data.success){
    const session = { role: role.value, phone: fullPhone(), password: password.value, name: data.name || '', is_online: data.is_online || 0 };
    saveSession(session);
    if(role.value === 'driver') location.href = '/app/driver.html';
    else location.href = '/app/passenger.html';
  } else {
    setMsg(data.error || 'ERROR');
  }
}

role.addEventListener('change', ()=>{
  driverFields.style.display = (mode === 'register' && role.value === 'driver') ? 'block' : 'none';
});
role.dispatchEvent(new Event('change'));

phoneDigits.addEventListener('input', ()=>{ phoneDigits.value = String(phoneDigits.value||'').replace(/\D/g,'').slice(0,9); });
car_year.addEventListener('input', ()=>{ car_year.value = String(car_year.value||'').replace(/\D/g,'').slice(0,4); });

// If already logged in, go directly
const s = getSession();
if(s && s.role){
  if(s.role === 'driver') location.href = '/app/driver.html';
  else location.href = '/app/passenger.html';
}

setMode('login');
</script>
</body>
</html>
