<!doctype html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PayTaksi</title>
<link rel="stylesheet" href="/assets/bolt.css" />
<style>
  body{background:#0b1220;color:#e5e7eb;font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
  .card{width:min(560px,92vw);background:rgba(15,23,42,.75);border:1px solid rgba(148,163,184,.2);border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  h2{margin:0 0 12px 0;text-align:center;font-weight:800}
  .sub{opacity:.85;text-align:center;margin:-6px 0 14px 0;font-size:13px}
  .grid{display:grid;grid-template-columns:1fr;gap:12px}
  .btn{width:100%;padding:14px 14px;border-radius:14px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.55);color:#e5e7eb;cursor:pointer;font-weight:800;font-size:16px}
  .btn:hover{border-color:rgba(34,197,94,.55)}
  .btn.primary{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.35)}
  .hint{opacity:.75;font-size:12px;text-align:center;margin-top:10px}
  .tiny{opacity:.65;font-size:11px;text-align:center;margin-top:10px}
  a{color:#93c5fd;text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <h2>PayTaksi</h2>
    <div class="sub">Müştəri və Sürücü üçün giriş ayrı-ayrıdır</div>

    <div class="grid" id="chooser">
      <button class="btn primary" type="button" onclick="goPassenger()">Müştəri Girişi</button>
      <button class="btn" type="button" onclick="goDriver()">Sürücü Girişi</button>
    </div>

    <div class="hint">Qeydiyyat hər giriş səhifəsində ayrıca var.</div>
    <div class="tiny" id="legacyWrap" style="display:none">Köhnə giriş səhifəsi: <a href="/legacy_auth.html">buradan</a></div>
  </div>

<script>
function getSession(){
  try{ return JSON.parse(localStorage.getItem('pt_session')||'null'); }catch(e){ return null; }
}

function goPassenger(){ location.href = '/passenger_login.html'; }
function goDriver(){ location.href = '/driver_login.html'; }

// If already logged in, go directly
const s = getSession();
if(s && s.role){
  if(s.role === 'driver') location.href = '/app/driver.html';
  else location.href = '/app/passenger.html';
}

// If admin wants combined auth, redirect to legacy page
(async ()=>{
  try{
    const r = await fetch('/api/public/settings');
    const d = await r.json();
    const mode = (d && d.settings && d.settings.auth_pages_mode) ? String(d.settings.auth_pages_mode) : 'split';
    if(mode === 'combined'){
      location.href = '/legacy_auth.html';
      return;
    }
    document.getElementById('legacyWrap').style.display = 'block';
  }catch(e){
    // If API not reachable, keep split chooser.
    document.getElementById('legacyWrap').style.display = 'block';
  }
})();
</script>
</body>
</html>
